<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZK PRO — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#080a0e;color:#eef2f7;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0f1318}::-webkit-scrollbar-thumb{background:#1e2530;border-radius:2px}
    input,select,textarea,button{font-family:'DM Sans',sans-serif}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .fade-in{animation:fadeIn .3s ease forwards}
    .scale-in{animation:scaleIn .25s ease forwards}
    .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#00e676;animation:pulse 2s infinite}
    .spinner{width:24px;height:24px;border:2px solid #1e2530;border-top-color:#00e5ff;border-radius:50%;animation:spin .7s linear infinite;margin:auto}
    .drop-zone{border:2px dashed #1e2530;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s}
    .drop-zone:hover,.drop-zone.drag-over{border-color:#00e5ff;background:#00e5ff08}
    .drop-zone input[type=file]{display:none}

    /* ── RESPONSIVE ── */
    .sidebar-desktop{display:flex}
    .sidebar-mobile{display:none}
    .main-content{margin-left:220px;max-width:calc(100vw - 220px)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .orders-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}

    @media(max-width:900px){
      .stats-grid{grid-template-columns:repeat(2,1fr)!important}
      .orders-grid{grid-template-columns:1fr!important}
    }
    @media(max-width:640px){
      .sidebar-desktop{display:none!important}
      .sidebar-mobile{display:flex!important;position:fixed;bottom:0;left:0;right:0;height:60px;background:#0f1318;border-top:1px solid #1e2530;z-index:200;align-items:stretch}
      .main-content{margin-left:0!important;max-width:100vw!important;padding:16px 14px 76px!important}
      .stats-grid{grid-template-columns:repeat(2,1fr)!important}
      .orders-grid{grid-template-columns:1fr!important}
      .hide-mobile{display:none!important}
    }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SB_URL = "https://hyigrnuoojusixzahjvq.supabase.co";
const SB_KEY = "sb_publishable_zvgnghWMy0byVdyrIxSafA_i52Nn2f9";
const SBH = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};
const BUCKET = "product-media";
const STORAGE_URL = `${SB_URL}/storage/v1/object/public/${BUCKET}`;
const UPLOAD_URL  = `${SB_URL}/storage/v1/object/${BUCKET}`;

async function sbGet(t,p=""){const r=await fetch(`${SB_URL}/rest/v1/${t}${p}`,{headers:SBH});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,id,body){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:"PATCH",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());}
async function sbPost(t,body){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:{...SBH,"Prefer":"return=representation"},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDelete(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:"DELETE",headers:SBH});if(!r.ok)throw new Error(await r.text());}

// Upload fichier vers Supabase Storage
async function uploadFile(file, folder="photos") {
  const ext  = file.name.split(".").pop();
  const name = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const r = await fetch(`${UPLOAD_URL}/${name}`, {
    method: "POST",
    headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": file.type },
    body: file,
  });
  if (!r.ok) throw new Error("Upload échoué: " + await r.text());
  return `${STORAGE_URL}/${name}`;
}

const C={bg:"#080a0e",surface:"#0f1318",card:"#141920",border:"#1e2530",accent:"#00e5ff",accentDim:"#00e5ff22",accentMid:"#00e5ff55",gold:"#f0b429",green:"#00e676",red:"#ff4757",orange:"#ff9f43",text1:"#eef2f7",text2:"#8b9ab0",text3:"#4a5568"};
const STATUS={nouveau:{label:"Nouveau",color:C.accent,bg:C.accentDim},traité:{label:"Traité",color:C.gold,bg:"#f0b42922"},expédié:{label:"Expédié",color:C.green,bg:"#00e67622"},annulé:{label:"Annulé",color:C.red,bg:"#ff475722"}};
const fmt=n=>parseFloat(n||0).toFixed(2).replace(".",",")+"\u00a0€";
const isVideo=url=>url&&/\.(mp4|webm|mov|avi)(\?|$)/i.test(url);

/* ── ATOMS ── */
function Badge({status}){const c=STATUS[status]||STATUS.nouveau;return <span style={{display:"inline-flex",padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:c.color,background:c.bg,border:`1px solid ${c.color}33`}}>{c.label}</span>;}
function Card({children,style={},onClick}){return <div onClick={onClick} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,...style}} onMouseEnter={e=>onClick&&(e.currentTarget.style.borderColor=C.accentMid)} onMouseLeave={e=>onClick&&(e.currentTarget.style.borderColor=C.border)}>{children}</div>;}
function Btn({children,onClick,variant="primary",style={},disabled}){
  const v={primary:{background:C.accent,color:C.bg,border:"none"},ghost:{background:"transparent",color:C.text2,border:`1px solid ${C.border}`},danger:{background:"transparent",color:C.red,border:`1px solid ${C.red}44`},gold:{background:C.gold,color:C.bg,border:"none"}};
  return <button onClick={onClick} disabled={disabled} style={{...v[variant],padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.5:1,transition:"opacity .15s",display:"inline-flex",alignItems:"center",gap:6,...style}} onMouseEnter={e=>!disabled&&(e.currentTarget.style.opacity=".8")} onMouseLeave={e=>!disabled&&(e.currentTarget.style.opacity="1")}>{children}</button>;
}
function Inp({label,value,onChange,type="text",placeholder,required,style={},min}){
  return <div style={{display:"flex",flexDirection:"column",gap:6,...style}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.text2,letterSpacing:"0.06em",textTransform:"uppercase"}}>{label}{required&&<span style={{color:C.red}}> *</span>}</label>}
    <input type={type} value={value} min={min} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:14,padding:"10px 14px",outline:"none"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
  </div>;
}
function Sel({label,value,onChange,options,style={}}){
  return <div style={{display:"flex",flexDirection:"column",gap:6,...style}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.text2,letterSpacing:"0.06em",textTransform:"uppercase"}}>{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:14,padding:"10px 14px",outline:"none",cursor:"pointer"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>;
}
function StatCard({icon,label,value,sub,color=C.accent,trend}){
  return <Card style={{display:"flex",flexDirection:"column",gap:12,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,right:0,width:80,height:80,background:`radial-gradient(circle at 100% 0%,${color}15 0%,transparent 70%)`}}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:24}}>{icon}</span>{trend!==undefined&&<span style={{fontSize:11,fontWeight:600,color:trend>=0?C.green:C.red}}>{trend>=0?"▲":"▼"} {Math.abs(trend)}%</span>}</div>
    <div><div style={{fontFamily:"'Bebas Neue'",fontSize:32,color,letterSpacing:"0.03em",lineHeight:1}}>{value}</div><div style={{fontSize:12,color:C.text2,marginTop:4,fontWeight:500}}>{label}</div>{sub&&<div style={{fontSize:11,color:C.text3,marginTop:2}}>{sub}</div>}</div>
  </Card>;
}

/* ── MEDIA PREVIEW ── */
function MediaPreview({url, style={}}){
  if(!url) return null;
  if(isVideo(url)) return <video src={url} style={{width:"100%",borderRadius:8,objectFit:"cover",...style}} autoPlay muted loop playsInline/>;
  return <img src={url} style={{width:"100%",borderRadius:8,objectFit:"cover",...style}} alt=""/>;
}

/* ── GALERIE LIBRE ── */
// medias = [{url, type: "image"|"video"}]
// Le 1er élément = vignette principale dans le catalogue
function GalerieEditor({medias, onChange}){
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [urlInput, setUrlInput]   = useState("");
  const [showUrl,  setShowUrl]    = useState(false);
  const fileRef = useRef();

  const addUrl = url => {
    if(!url) return;
    const type = isVideo(url) ? "video" : "image";
    onChange([...medias, {url, type}]);
  };

  const handleFiles = async(files) => {
    if(!files.length) return;
    setUploading(true);
    try {
      const uploaded = [];
      for(const file of Array.from(files)){
        const folder = file.type.startsWith("video") ? "videos" : "photos";
        const url    = await uploadFile(file, folder);
        const type   = file.type.startsWith("video") ? "video" : "image";
        uploaded.push({url, type});
      }
      onChange([...medias, ...uploaded]);
    } catch(e){ alert("Erreur upload : " + e.message); }
    setUploading(false);
  };

  const remove = idx => onChange(medias.filter((_,i)=>i!==idx));
  const moveFirst = idx => {
    const copy = [...medias];
    const [item] = copy.splice(idx,1);
    onChange([item, ...copy]);
  };

  const applyUrl = () => {
    const u = urlInput.trim();
    if(u){ addUrl(u); setUrlInput(""); setShowUrl(false); }
  };

  return <div style={{display:"flex",flexDirection:"column",gap:12}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <label style={{fontSize:12,fontWeight:600,color:C.text2,letterSpacing:"0.06em",textTransform:"uppercase"}}>
        📸 Médias du produit
      </label>
      <span style={{fontSize:11,color:C.text3}}>
        {medias.length === 0 ? "Aucun média" : `${medias.length} fichier${medias.length>1?"s":""} · Le 1er = vignette principale`}
      </span>
    </div>

    {/* Grille des médias ajoutés */}
    {medias.length > 0 && <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8}}>
      {medias.map((m,i) => (
        <div key={i} style={{position:"relative",borderRadius:10,overflow:"hidden",border:`2px solid ${i===0?C.accent:C.border}`,aspectRatio:"1/1",background:C.surface}}>
          {/* Badge "Principal" sur le 1er */}
          {i===0 && <span style={{position:"absolute",top:5,left:5,background:C.accent,color:"#000",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,letterSpacing:"0.05em",zIndex:2}}>PRINCIPAL</span>}
          {/* Aperçu */}
          {m.type==="video"
            ? <video src={m.url} style={{width:"100%",height:"100%",objectFit:"cover"}} autoPlay muted loop playsInline/>
            : <img   src={m.url} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
          }
          {/* Badge type */}
          <span style={{position:"absolute",bottom:4,left:4,background:"#000000bb",borderRadius:4,fontSize:9,padding:"2px 5px",color:"#fff"}}>
            {m.type==="video"?"🎬 Vidéo":"📷 Photo"}
          </span>
          {/* Actions */}
          <div style={{position:"absolute",top:4,right:4,display:"flex",flexDirection:"column",gap:3}}>
            <button onClick={()=>remove(i)} title="Supprimer"
              style={{background:"#ff475799",border:"none",borderRadius:5,color:"#fff",cursor:"pointer",width:22,height:22,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            {i>0&&<button onClick={()=>moveFirst(i)} title="Mettre en principal"
              style={{background:"#00e5ff99",border:"none",borderRadius:5,color:"#000",cursor:"pointer",width:22,height:22,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>★</button>}
          </div>
        </div>
      ))}
    </div>}

    {/* Zone de dépôt */}
    <div
      className={`drop-zone${dragging?" drag-over":""}`}
      onDragOver={e=>{e.preventDefault();setDragging(true);}}
      onDragLeave={()=>setDragging(false)}
      onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files);}}
      onClick={()=>fileRef.current?.click()}
    >
      <input ref={fileRef} type="file" accept="image/*,video/*" multiple onChange={e=>handleFiles(e.target.files)}/>
      {uploading
        ? <div style={{color:C.accent,fontSize:13,padding:"8px 0"}}>⏳ Upload en cours...</div>
        : <div style={{color:C.text3,fontSize:13}}>
            <div style={{fontSize:26,marginBottom:6}}>📂</div>
            <div><span style={{color:C.accent,fontWeight:600}}>Glisse tes fichiers ici</span> ou clique pour choisir</div>
            <div style={{fontSize:11,marginTop:4,color:C.text3}}>Photos (JPG, PNG, WebP) + Vidéos (MP4) — plusieurs à la fois</div>
          </div>
      }
    </div>

    {/* Lien URL externe */}
    <div>
      <button onClick={()=>setShowUrl(v=>!v)}
        style={{background:"none",border:"none",color:C.text3,fontSize:12,cursor:"pointer",padding:0,textDecoration:"underline"}}>
        {showUrl?"▲ Masquer":"▼ Ajouter via lien URL (Google Drive, Instagram...)"}
      </button>
      {showUrl&&<div style={{display:"flex",gap:8,marginTop:8}}>
        <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://..." onKeyDown={e=>e.key==="Enter"&&applyUrl()}
          style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:13,padding:"8px 12px",outline:"none"}}
          onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
        <Btn onClick={applyUrl} style={{padding:"8px 12px",fontSize:12}}>+ Ajouter</Btn>
      </div>}
    </div>
  </div>;
}

/* ── GOUTS EDITOR ── */
function GoutsEditor({gouts, onChange}){
  const [newGout, setNewGout] = useState("");
  const add=()=>{const g=newGout.trim();if(!g||gouts.includes(g))return;onChange([...gouts,g]);setNewGout("");};
  const remove=idx=>onChange(gouts.filter((_,i)=>i!==idx));
  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    <label style={{fontSize:12,fontWeight:600,color:C.text2,letterSpacing:"0.06em",textTransform:"uppercase"}}>Goûts disponibles</label>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,minHeight:36,padding:"8px",background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
      {gouts.map((g,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",background:C.accentDim,border:`1px solid ${C.accentMid}`,borderRadius:20,fontSize:12,color:C.accent}}>
        {g}<button onClick={()=>remove(i)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</button>
      </span>)}
      {gouts.length===0&&<span style={{color:C.text3,fontSize:12,alignSelf:"center"}}>Aucun goût (ex: accessoire, recharge)</span>}
    </div>
    <div style={{display:"flex",gap:8}}>
      <input value={newGout} onChange={e=>setNewGout(e.target.value)} placeholder="Ex: Mangue Glacée" onKeyDown={e=>e.key==="Enter"&&add()}
        style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:13,padding:"8px 12px",outline:"none"}}
        onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
      <Btn onClick={add} style={{padding:"8px 14px",fontSize:12}}>+ Ajouter</Btn>
    </div>
  </div>;
}

/* ── STOCK EDITOR INLINE ── */
function StockEditor({product, onUpdate}){
  const [editing, setEditing]=useState(false);
  const [val, setVal]=useState(String(product.stock));
  const [saving, setSaving]=useState(false);
  const save=async()=>{
    setSaving(true);
    try{await sbPatch("products",product.id,{stock:parseInt(val)||0});onUpdate({...product,stock:parseInt(val)||0});setEditing(false);}
    catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };
  if(!editing)return <div style={{display:"flex",alignItems:"center",gap:8}}>
    <span style={{fontSize:18,fontWeight:700,color:product.stock<50?C.orange:C.green}}>{product.stock}</span>
    <button onClick={()=>{setVal(String(product.stock));setEditing(true);}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.text3,cursor:"pointer",fontSize:11,padding:"2px 8px"}}>Modifier</button>
  </div>;
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} onChange={e=>setVal(e.target.value)} min="0"
      style={{width:80,background:C.surface,border:`1px solid ${C.accent}`,borderRadius:6,color:C.text1,fontSize:13,padding:"4px 8px",outline:"none"}}
      onKeyDown={e=>e.key==="Enter"&&save()} autoFocus/>
    <Btn onClick={save} disabled={saving} style={{padding:"4px 10px",fontSize:11}}>{saving?"...":"✓"}</Btn>
    <button onClick={()=>setEditing(false)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:16}}>×</button>
  </div>;
}

        <div style={{marginBottom:24}}><div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:C.text1,letterSpacing:"0.05em"}}>Connexion</div><div style={{fontSize:13,color:C.text2,marginTop:4}}>Accès réservé aux administrateurs</div></div>

/* ── SIDEBAR ── */
function Sidebar({page,setPage,onLogout,newCount,unreadMsg}){
  const nav=[{id:"dashboard",icon:"◈",label:"Dashboard"},{id:"orders",icon:"≡",label:"Commandes"},{id:"catalog",icon:"⊞",label:"Catalogue"},{id:"messages",icon:"✉",label:"Messages"},{id:"settings",icon:"⊙",label:"Paramètres"}];

  // Barre de navigation mobile (bas d'écran)
  const MobileNav = ()=>(
    <div className="sidebar-mobile">
      {nav.map(item=>(
        <button key={item.id} onClick={()=>setPage(item.id)}
          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,background:"transparent",border:"none",color:page===item.id?C.accent:C.text3,cursor:"pointer",padding:"6px 4px",position:"relative",fontFamily:"'DM Sans',sans-serif"}}>

const EMPTY={name:"",cat:"puff",emoji:"💨",price:"",unit:"/ unité",min_qty:"10",badge:"",stock:"",gouts:[],medias:[]};

function CatalogPage({products,setProducts,loading,reload}){
  const [filter,setFilter]=useState("tous");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(EMPTY);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState("");

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};
  const setF=patch=>setForm(f=>({...f,...patch}));

  const openNew=()=>{setForm(EMPTY);setModal("new");};
  const openEdit=p=>{
    const existingMedias = [];
    if(p.image_url) existingMedias.push({url:p.image_url, type:"image"});
    if(p.video_url) existingMedias.push({url:p.video_url, type:"video"});
    const gal = Array.isArray(p.gallery)?p.gallery:(p.gallery?JSON.parse(p.gallery||"[]"):[]);
    gal.forEach(url=>{if(url&&!existingMedias.find(m=>m.url===url))existingMedias.push({url,type:isVideo(url)?"video":"image"});});
    setForm({name:p.name,cat:p.cat,emoji:p.emoji||"💨",price:String(p.price),unit:p.unit,min_qty:String(p.min_qty),badge:p.badge||"",stock:String(p.stock),
      gouts:Array.isArray(p.gouts)?p.gouts:(p.gouts?JSON.parse(p.gouts):[]),
      medias: existingMedias});
    setModal(p);
  };

  const save=async()=>{
    if(!form.name||!form.price)return;
    setSaving(true);
    // Extraire image_url (1ère photo), video_url (1ère vidéo), gallery (reste)
    const firstImg  = form.medias.find(m=>m.type==="image");
    const firstVid  = form.medias.find(m=>m.type==="video");
    const gallery   = form.medias.filter(m=>m!==firstImg&&m!==firstVid).map(m=>m.url);
    const body={name:form.name,cat:form.cat,emoji:form.emoji,price:parseFloat(form.price),unit:form.unit,min_qty:parseInt(form.min_qty)||1,stock:parseInt(form.stock)||0,badge:form.badge||null,gouts:form.gouts,
      image_url:firstImg?.url||null, video_url:firstVid?.url||null, gallery};
    try{
      if(modal==="new"){const [r]=await sbPost("products",body);setProducts(prev=>[...prev,r]);showToast("✅ Produit ajouté !");}
      else{await sbPatch("products",modal.id,body);setProducts(prev=>prev.map(p=>p.id===modal.id?{...p,...body}:p));showToast("✅ Produit modifié !");}
      setModal(null);
    }catch(e){alert("Erreur: "+e.message);}
    setSaving(false);
  };

  const remove=async id=>{
    if(!confirm("Supprimer ce produit ?"))return;
    try{await sbDelete("products",id);setProducts(prev=>prev.filter(p=>p.id!==id));showToast("🗑️ Supprimé");}
    catch(e){alert(e.message);}
  };

  const updateProduct=updated=>setProducts(prev=>prev.map(p=>p.id===updated.id?updated:p));
  const filtered=filter==="tous"?products:products.filter(p=>p.cat===filter);

  return <div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20,position:"relative"}}>
    {toast&&<div style={{position:"fixed",bottom:24,right:24,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 20px",fontSize:14,zIndex:999,boxShadow:"0 8px 32px #00000080"}}>{toast}</div>}

        </div>
      </div>
    </div>}
  </div>;
}

const BOT_TOKEN_DASH = "8700497448:AAG8DKiQ8d43FUIYU1j5d7IoDouq2DRI3-s";
const TG_API = `https://api.telegram.org/bot${BOT_TOKEN_DASH}`;

async function sendTgMessage(chatId, text){
  const r = await fetch(`${TG_API}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatId,text,parse_mode:"Markdown"})});
  if(!r.ok) throw new Error("Telegram error");
  const data = await r.json();
  return data?.result?.message_id || null;
}

async function sendTgFile(chatId, file){
  const isImg=file.type.startsWith("image/"), isVid=file.type.startsWith("video/");
  const endpoint=isImg?"sendPhoto":isVid?"sendVideo":"sendDocument";
  const field=isImg?"photo":isVid?"video":"document";
  const fd=new FormData(); fd.append("chat_id",chatId); fd.append(field,file);
  const r=await fetch(`${TG_API}/${endpoint}`,{method:"POST",body:fd});
  if(!r.ok) throw new Error("Upload échoué");
  const data=await r.json();
  return data?.result?.message_id||null;
}

function MessagesPage({onRead, onGoToOrder}){
  const [users,setUsers]=useState([]);
  const [messages,setMessages]=useState([]);
  const [selected,setSelected]=useState(null);
  const [loading,setLoading]=useState(false);
  const [reply,setReply]=useState("");
  const [replyFile,setReplyFile]=useState(null);
  const [sending,setSending]=useState(false);
  const [broadcast,setBroadcast]=useState("");
  const [broadcastFile,setBroadcastFile]=useState(null);
  const [broadcasting,setBroadcasting]=useState(false);
  const [tab,setTab]=useState("inbox");
  const [toast,setToast]=useState("");
  const messagesEndRef=useRef(null);
  const fileRef=useRef(null);
  const broadcastFileRef=useRef(null);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};
  const readIds=()=>JSON.parse(localStorage.getItem("zkpro_read_ids")||"[]");
  const userMessages=uid=>messages.filter(m=>m.telegram_id===uid).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const lastMsg=u=>{const ms=messages.filter(m=>m.telegram_id===u.id);if(!ms.length)return null;return ms.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];};
  const unreadForUser=uid=>messages.filter(m=>m.telegram_id===uid&&m.direction==="in"&&!readIds().includes(m.id)).length;
  const displayName=u=>u.username?`@${u.username}`:`${u.first_name||""}${u.last_name?` ${u.last_name}`:""}`.trim()||`User ${u.id}`;

  // Trier les users par date du dernier message (plus récent en haut)
  const sortedUsers = [...users].sort((a,b)=>{
    const la=lastMsg(a), lb=lastMsg(b);
    if(!la&&!lb) return 0;
    if(!la) return 1;
    if(!lb) return -1;
    return new Date(lb.created_at)-new Date(la.created_at);
  });

  // Extraire l'ID de commande d'un message récap
  const getOrderId = text => {
    const m = text?.match(/CMD-\d+/);
    return m ? m[0] : null;
  };

  // Rendu d'un message — carte cliquable si c'est un récap commande
  const renderMessage = m => {
    const orderId = getOrderId(m.text);
    const isOrderCard = m.direction==="out" && orderId && m.text?.includes("Récap commande");

    if(isOrderCard){
      return <div onClick={()=>onGoToOrder&&onGoToOrder(orderId)}
        style={{padding:"10px 14px",background:C.bg,border:`1.5px solid ${C.accentMid}`,borderRadius:12,cursor:"pointer",transition:"all .15s"}}
        onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent}
        onMouseLeave={e=>e.currentTarget.style.borderColor=C.accentMid}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:16}}>🧾</span>
          <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{orderId}</span>
        </div>
        <div style={{fontSize:11,color:C.text2}}>Récap commande envoyé</div>
        <div style={{fontSize:10,color:C.accent,marginTop:4,fontWeight:600}}>Voir la commande →</div>
      </div>;
    }

    const isImg = m.media_url && /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(m.media_url);
    const isVid = m.media_url && /\.(mp4|webm|mov)(\?|$)/i.test(m.media_url);
    const isDoc = m.media_url && !isImg && !isVid;

    return <div style={{padding: m.media_url ? "6px" : "9px 13px",borderRadius:m.direction==="out"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.direction==="out"?C.accent:C.surface,color:m.direction==="out"?C.bg:C.text1,fontSize:13,lineHeight:1.5,wordBreak:"break-word",overflow:"hidden"}}>
      {isImg && <img src={m.media_url} alt="photo" style={{width:"100%",maxWidth:260,borderRadius:10,display:"block",marginBottom:m.text&&m.text!=="📷 Photo"?6:0}} onClick={()=>window.open(m.media_url,"_blank")}/>}
      {isVid && <video src={m.media_url} controls style={{width:"100%",maxWidth:260,borderRadius:10,display:"block",marginBottom:m.text&&m.text!=="🎬 Vidéo"?6:0}}/>}
      {isDoc && <a href={m.media_url} target="_blank" style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",color:m.direction==="out"?C.bg:C.accent,textDecoration:"none",marginBottom:m.text?6:0}}>
        <span style={{fontSize:20}}>📎</span>
        <span style={{fontSize:12,fontWeight:600,textDecoration:"underline"}}>{m.text?.replace("📎 ","")}</span>
      </a>}
      {m.text && m.text !== "📷 Photo" && m.text !== "🎬 Vidéo" && !isDoc && <span style={{padding: m.media_url ? "0 4px 4px" : 0,display:"block"}}>{m.text}</span>}
    </div>;
  };

  const markRead=(uid,msgs)=>{
    const ids=(msgs||messages).filter(m=>m.telegram_id===uid&&m.direction==="in").map(m=>m.id);
    const merged=[...new Set([...readIds(),...ids])].slice(-1000);
    localStorage.setItem("zkpro_read_ids",JSON.stringify(merged));
    if(onRead)onRead();
  };
  const markAllRead=msgs=>{
    const ids=msgs.filter(m=>m.direction==="in").map(m=>m.id);
    const merged=[...new Set([...readIds(),...ids])].slice(-1000);
    localStorage.setItem("zkpro_read_ids",JSON.stringify(merged));
    if(onRead)onRead();
  };

  const fetchData=async(silent=false)=>{
    if(!silent)setLoading(true);
    try{
      const[u,m]=await Promise.all([sbGet("bot_users","?order=last_seen.desc"),sbGet("bot_messages","?order=created_at.desc&limit=500")]);
      setUsers(u); setMessages(m);
    }catch(e){console.error(e);}
    if(!silent)setLoading(false);
  };

  useEffect(()=>{fetchData();},[]);
  useEffect(()=>{const t=setInterval(()=>fetchData(true),5000);return()=>clearInterval(t);},[]);

  // Scroll en bas à chaque nouveau message ou changement de conversation
  useEffect(()=>{
    if(messagesEndRef.current) messagesEndRef.current.scrollIntoView({behavior:"smooth"});
  },[messages,selected]);

  // Ref sur le conteneur messages pour l'IntersectionObserver
  const messagesContainerRef = useRef(null);

  // Marquer comme lus SEULEMENT quand les messages sont visibles à l'écran
  useEffect(()=>{
    if(!selected || !messagesContainerRef.current) return;
    const container = messagesContainerRef.current;

    const observer = new IntersectionObserver((entries)=>{
      const visibleIds = [];
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          const id = parseInt(entry.target.dataset.msgid);
          const dir = entry.target.dataset.direction;
          if(id && dir === "in") visibleIds.push(id);
        }
      });
      if(visibleIds.length > 0){
        const existing = JSON.parse(localStorage.getItem("zkpro_read_ids")||"[]");
        const merged = [...new Set([...existing,...visibleIds])].slice(-1000);
        localStorage.setItem("zkpro_read_ids", JSON.stringify(merged));
        if(onRead) onRead();
      }
    }, { root: container, threshold: 0.5 });

    // Observer tous les messages entrants non lus
    const unreadMsgs = container.querySelectorAll("[data-direction='in']");
    unreadMsgs.forEach(el => observer.observe(el));

    return () => observer.disconnect();
  },[selected, messages]);

  const deleteMsg=async msg=>{
    if(msg.direction==="out"&&msg.tg_message_id){
      try{await fetch(`${TG_API}/deleteMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:msg.telegram_id,message_id:msg.tg_message_id})});}catch(e){}
    }
    try{await fetch(`${SB_URL}/rest/v1/bot_messages?id=eq.${msg.id}`,{method:"DELETE",headers:SBH});setMessages(prev=>prev.filter(m=>m.id!==msg.id));}catch(e){}
  };

  const sendReply=async()=>{
    if(!selected||(!reply.trim()&&!replyFile))return;
    setSending(true);
    try{
      let tgMsgId=null;
      let displayText=reply.trim();
      if(replyFile){
        tgMsgId=await sendTgFile(selected.id,replyFile);
        if(reply.trim())await sendTgMessage(selected.id,reply.trim());
        displayText=`📎 ${replyFile.name}${reply.trim()?` — ${reply.trim()}`:""}`;
      }else{
        tgMsgId=await sendTgMessage(selected.id,reply.trim());
      }
      const newMsg={id:Date.now(),telegram_id:selected.id,direction:"out",text:displayText,tg_message_id:tgMsgId,created_at:new Date().toISOString()};
      await fetch(`${SB_URL}/rest/v1/bot_messages`,{method:"POST",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({telegram_id:selected.id,direction:"out",text:displayText,tg_message_id:tgMsgId})});
      // Remonter l'utilisateur en haut de la liste
      await fetch(`${SB_URL}/rest/v1/bot_users?id=eq.${selected.id}`,{method:"PATCH",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({last_seen:new Date().toISOString()})});
      setMessages(prev=>[...prev,newMsg]);
      setUsers(prev=>prev.map(u=>u.id===selected.id?{...u,last_seen:new Date().toISOString()}:u));
      setReply(""); setReplyFile(null); if(fileRef.current)fileRef.current.value="";
      showToast("✅ Envoyé !");
    }catch(e){alert("Erreur: "+e.message);}
    setSending(false);
  };

  const sendBroadcast=async()=>{
    if(!broadcast.trim()&&!broadcastFile)return;
    if(!confirm(`Envoyer à ${users.length} utilisateurs ?`))return;
    setBroadcasting(true);
    let ok=0,fail=0;
    const sentAt=new Date().toISOString();
    const displayText=broadcastFile?`📎 ${broadcastFile.name}${broadcast.trim()?` — ${broadcast.trim()}`:""}`:broadcast.trim();
    for(const u of users){
      try{
        let tgMsgId=null;
        if(broadcastFile){tgMsgId=await sendTgFile(u.id,broadcastFile);if(broadcast.trim())await sendTgMessage(u.id,broadcast.trim());}
        else{tgMsgId=await sendTgMessage(u.id,broadcast.trim());}
        await fetch(`${SB_URL}/rest/v1/bot_messages`,{method:"POST",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({telegram_id:u.id,direction:"out",text:displayText,tg_message_id:tgMsgId,created_at:sentAt,is_broadcast:true})});
        ok++;
      }catch(e){fail++;}
      await new Promise(r=>setTimeout(r,50));
    }
    showToast(`✅ Envoyé à ${ok} utilisateurs${fail>0?` (${fail} échecs)`:""}`);
    setBroadcast(""); setBroadcastFile(null); if(broadcastFileRef.current)broadcastFileRef.current.value="";
    setBroadcasting(false); fetchData();
  };

  const broadcastGroups=()=>{
    const out=messages.filter(m=>m.direction==="out"&&m.is_broadcast===true);
    const groups={};
    out.forEach(m=>{const key=m.text+"|"+m.created_at.slice(0,16);if(!groups[key])groups[key]={text:m.text,created_at:m.created_at,msgs:[]};groups[key].msgs.push(m);});
    return Object.values(groups).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  };

  const deleteBroadcastGroup=async group=>{
    if(!confirm(`Supprimer ce broadcast pour ${group.msgs.length} utilisateurs ?`))return;
    for(const m of group.msgs){
      if(m.tg_message_id){try{await fetch(`${TG_API}/deleteMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:m.telegram_id,message_id:m.tg_message_id})});}catch(e){}}
      try{await fetch(`${SB_URL}/rest/v1/bot_messages?id=eq.${m.id}`,{method:"DELETE",headers:SBH});}catch(e){}

  return <div className="fade-in" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 64px)"}}>

    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexShrink:0}}>
      <div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:36,letterSpacing:"0.05em"}}>Messages</div>
        <div style={{fontSize:12,color:C.text3,marginTop:2}}>{users.length} utilisateurs · {messages.filter(m=>m.direction==="in").length} reçus</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn variant="ghost" onClick={()=>fetchData()}>🔄</Btn>
        <div style={{display:"flex",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
          {["inbox","broadcast"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"8px 16px",background:tab===t?C.accent:"transparent",color:tab===t?C.bg:C.text2,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>

    {loading?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div>:

    tab==="broadcast"?(
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{maxWidth:600}}>
          <Card>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:"0.05em",marginBottom:6}}>Envoyer à tous</div>

            </div>}
            <textarea value={broadcast} onChange={e=>setBroadcast(e.target.value)} placeholder="Votre message... (*gras*, _italique_)"
              style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,color:C.text1,fontSize:14,padding:"12px 14px",outline:"none",resize:"vertical",minHeight:100,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box"}}
              onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,gap:10}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>broadcastFileRef.current?.click()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text2,cursor:"pointer",padding:"7px 12px",fontSize:13}}>📎 Fichier</button>
                <input ref={broadcastFileRef} type="file" accept="image/*,video/*,application/pdf,.doc,.docx" style={{display:"none"}} onChange={e=>setBroadcastFile(e.target.files[0]||null)}/>
              </div>
              <Btn onClick={sendBroadcast} disabled={broadcasting||(!broadcast.trim()&&!broadcastFile)}>
                {broadcasting?"⏳ Envoi...`":`📢 Envoyer à ${users.length}`}
              </Btn>
            </div>
          </Card>
          <div style={{marginTop:20}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:12,color:C.text2}}>Historique ({broadcastGroups().length})</div>
            {broadcastGroups().length===0&&<div style={{padding:20,textAlign:"center",color:C.text3,fontSize:13}}>Aucun broadcast</div>}
            {broadcastGroups().map((g,i)=><div key={i} style={{padding:"14px 16px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:12,marginBottom:8}}>
                <div style={{fontSize:13,color:C.text1,lineHeight:1.5,whiteSpace:"pre-wrap",flex:1}}>{g.text}</div>
                <button onClick={()=>deleteBroadcastGroup(g)} style={{background:"none",border:`1px solid ${C.red}44`,borderRadius:6,color:C.red,cursor:"pointer",fontSize:11,padding:"4px 10px",flexShrink:0}}>🗑️ Supprimer</button>
              </div>
              <div style={{display:"flex",gap:10}}>
                <span style={{fontSize:11,color:C.text3}}>{new Date(g.created_at).toLocaleString("fr-FR")}</span>
                <span style={{fontSize:11,background:C.accentDim,color:C.accent,border:`1px solid ${C.accentMid}`,borderRadius:4,padding:"1px 8px"}}>📢 {g.msgs.length} dest.</span>
              </div>
            </div>)}
          </div>
        </div>
      </div>
    ):(
      <div style={{display:"flex",flex:1,minHeight:0,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {/* Liste */}
        <div style={{width:280,flexShrink:0,background:C.surface,borderRight:`1px solid ${C.border}`,overflowY:"auto"}}>
          {users.length===0&&<div style={{padding:24,textAlign:"center",color:C.text3,fontSize:13}}>Aucun utilisateur</div>}
          {sortedUsers.map(u=>{
            const last=lastMsg(u),isSelected=selected?.id===u.id,unread=unreadForUser(u.id);
            return <div key={u.id} onClick={()=>{setSelected(u);markRead(u.id);}}
              style={{padding:"12px 16px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,background:isSelected?C.accentDim:"transparent",borderLeft:isSelected?`3px solid ${C.accent}`:"3px solid transparent"}}
              onMouseEnter={e=>!isSelected&&(e.currentTarget.style.background="#ffffff06")}
              onMouseLeave={e=>!isSelected&&(e.currentTarget.style.background="transparent")}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:13,fontWeight:600,color:isSelected?C.accent:C.text1}}>{displayName(u)}</span>
                {unread>0&&<span style={{background:C.red,color:"#fff",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 7px"}}>{unread}</span>}
              </div>
              {last&&<div style={{fontSize:11,color:C.text3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last.direction==="out"?"✓ ":""}{last.text}</div>}
              <div style={{fontSize:10,color:C.text3,marginTop:2}}>{new Date(u.last_seen).toLocaleDateString("fr-FR")}</div>
            </div>;
          })}
        </div>

        {/* Conversation */}
        <div style={{flex:1,display:"flex",flexDirection:"column",background:C.card,minHeight:0}}>
          {!selected?(
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.text3,fontSize:14}}>← Sélectionne une conversation</div>
          ):<>
            <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div>
                <div style={{fontWeight:700,fontSize:15}}>{displayName(selected)}</div>
                <div style={{fontSize:11,color:C.text3}}>ID: {selected.id} · Depuis {new Date(selected.started_at).toLocaleDateString("fr-FR")}</div>
              </div>
              <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18}}>×</button>
            </div>

            {/* Messages - scroll automatique */}
            <div ref={messagesContainerRef} style={{flex:1,overflowY:"auto",padding:"16px 18px",display:"flex",flexDirection:"column",gap:8,minHeight:0}}>
              {userMessages(selected.id).length===0&&<div style={{textAlign:"center",color:C.text3,fontSize:13,padding:24}}>Aucun message</div>}
              {userMessages(selected.id).map(m=>(
                <div key={m.id} data-msgid={m.id} data-direction={m.direction} style={{display:"flex",justifyContent:m.direction==="out"?"flex-end":"flex-start",gap:6,alignItems:"flex-end"}}>
                  {m.direction==="in"&&<div style={{width:28,height:28,borderRadius:"50%",background:C.accentDim,border:`1px solid ${C.accentMid}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>👤</div>}
                  <div style={{maxWidth:"72%"}}>
                    {renderMessage(m)}
                    <div style={{fontSize:10,color:C.text3,marginTop:3,display:"flex",alignItems:"center",gap:6,justifyContent:m.direction==="out"?"flex-end":"flex-start"}}>
                      {new Date(m.created_at).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}
                      {m.direction==="out"&&<button onClick={()=>deleteMsg(m)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:11,padding:0,opacity:.6}}>🗑</button>}
                    </div>
                  </div>
                  {m.direction==="in"&&<button onClick={()=>deleteMsg(m)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:11,opacity:.4}}>🗑</button>}
                </div>
              ))}
              <div ref={messagesEndRef}/>
            </div>

            {/* Zone réponse */}
            <div style={{padding:"10px 14px",borderTop:`1px solid ${C.border}`,background:C.surface,flexShrink:0}}>
              {replyFile&&<div style={{padding:"6px 10px",background:C.accentDim,borderRadius:8,marginBottom:8,fontSize:12,color:C.accent,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>📎 {replyFile.name}</span>
                <button onClick={()=>{setReplyFile(null);fileRef.current.value="";}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14}}>×</button>
              </div>}
              <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                <button onClick={()=>fileRef.current?.click()} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,color:C.text2,cursor:"pointer",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📎</button>
                <input ref={fileRef} type="file" accept="image/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx" style={{display:"none"}} onChange={e=>setReplyFile(e.target.files[0]||null)}/>
                <textarea value={reply} onChange={e=>setReply(e.target.value)}
                  placeholder="Message... (Entrée = envoyer, Maj+Entrée = saut de ligne)"
                  onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendReply())}
                  style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,color:C.text1,fontSize:13,padding:"9px 13px",outline:"none",resize:"none",maxHeight:120,minHeight:38,fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}}
                  onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border} rows={1}/>
                <button onClick={sendReply} disabled={sending||(!reply.trim()&&!replyFile)}
                  style={{background:sending||(!reply.trim()&&!replyFile)?C.border:C.accent,border:"none",borderRadius:10,color:C.bg,cursor:"pointer",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                  {sending?"⏳":"➤"}
                </button>
              </div>
            </div>
          </>}
        </div>
      </div>
    )}
  </div>;
}

/* ── APP ── */
function App(){
  const [logged,setLogged]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [orders,setOrders]=useState([]);
  const [selectedOrder,setSelectedOrder]=useState(null);
  const [products,setProducts]=useState([]);
  const [loadO,setLoadO]=useState(false);
  const [loadP,setLoadP]=useState(false);
  const [unreadMsgCount,setUnreadMsgCount]=useState(0);

  const fetchOrders=async()=>{setLoadO(true);try{setOrders(await sbGet("orders","?order=created_at.desc"));}catch(e){console.error(e);}setLoadO(false);};
  const fetchProducts=async()=>{setLoadP(true);try{setProducts(await sbGet("products","?order=id.asc"));}catch(e){console.error(e);}setLoadP(false);};

  // Poll messages non lus toutes les 5s pour le badge sidebar
  const pollUnread = async () => {
    try {
      const msgs = await sbGet("bot_messages","?direction=eq.in&order=created_at.desc&limit=200");
      const readIds = JSON.parse(localStorage.getItem("zkpro_read_ids")||"[]");
      const unread = msgs.filter(m=>!readIds.includes(m.id)).length;
      setUnreadMsgCount(unread);
    } catch(e){}
  };

  useEffect(()=>{if(logged){fetchOrders();fetchProducts();pollUnread();}}, [logged]);
  useEffect(()=>{if(!logged)return;const t=setInterval(fetchOrders,30000);return()=>clearInterval(t);},[logged]);
  useEffect(()=>{if(!logged)return;const t=setInterval(pollUnread,5000);return()=>clearInterval(t);},[logged]);

  const newCount=orders.filter(o=>o.status==="nouveau").length;
  if(!logged)return <LoginPage onLogin={()=>setLogged(true)}/>;
  return <div style={{display:"flex",minHeight:"100vh"}}>
    <Sidebar page={page} setPage={setPage} onLogout={()=>setLogged(false)} newCount={newCount} unreadMsg={unreadMsgCount}/>
    <main className="main-content" style={{flex:1,padding:"32px 28px"}}>
      {page==="dashboard"&&<DashboardPage orders={orders} setPage={setPage} loading={loadO}/>}
      {page==="orders"&&<OrdersPage orders={orders} setOrders={setOrders} loading={loadO} reload={fetchOrders} selectedOrder={selectedOrder} setSelectedOrder={setSelectedOrder}/>}
      {page==="catalog"&&<CatalogPage products={products} setProducts={setProducts} loading={loadP} reload={fetchProducts}/>}
      {page==="messages"&&<MessagesPage onRead={()=>{setUnreadMsgCount(0);pollUnread();}} onGoToOrder={orderId=>{setSelectedOrder(orderId);setPage("orders");fetchOrders();}}/>}
      {page==="settings"&&<div className="fade-in" style={{maxWidth:680}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:36,letterSpacing:"0.05em",marginBottom:24}}>Paramètres</div>
        <Card>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:"0.05em",marginBottom:16}}>Liens rapides</div>
          {[{label:"🛒 Boutique Telegram",url:"https://anserfj.github.io/telegram-shop/",sub:"anserfj.github.io/telegram-shop"},{label:"🗄️ Supabase Console",url:"https://supabase.com/dashboard",sub:"hyigrnuoojusixzahjvq.supabase.co"}].map(l=>
          <div key={l.url} style={{padding:"14px 16px",background:C.surface,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{l.label}</div><div style={{fontSize:11,color:C.text3,fontFamily:"'JetBrains Mono'",marginTop:2}}>{l.sub}</div></div>
            <Btn variant="ghost" style={{fontSize:12}} onClick={()=>window.open(l.url,"_blank")}>Ouvrir</Btn>
          </div>)}
        </Card>
        <Card style={{marginTop:16}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:20,letterSpacing:"0.05em",marginBottom:16}}>Compte</div>
          <button onClick={()=>setLogged(false)} style={{padding:"10px 20px",borderRadius:8,background:"transparent",border:`1px solid ${C.red}44`,color:C.red,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Déconnexion</button>
        </Card>
      </div>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

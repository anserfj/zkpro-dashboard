    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .spinner{width:24px;height:24px;border:2px solid #1e2530;border-top-color:#00e5ff;border-radius:50%;animation:spin .7s linear infinite;margin:auto}
    .drop-zone{border:2px dashed #1e2530;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s}

    .drop-zone input[type=file]{display:none}
    .row-hover:hover{background:#ffffff06!important;cursor:pointer}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}

    .sidebar-desktop{display:flex}
    .sidebar-mobile{display:none}
    .main-content{margin-left:220px;max-width:calc(100vw - 220px);padding:28px 24px}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .hide-mobile{display:table-cell}
    .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}

    .dash-grid-equal{display:grid;grid-template-columns:1fr 1fr;gap:16px}

async function uploadFile(file,folder="photos"){
  const ext=file.name.split(".").pop();
  const name=`${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const r=await fetch(`${UPLOAD_URL}/${name}`,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":file.type},body:file});

async function sendTgFile(chatId,file){

/* ── MINI SPARKLINE ── */
function Sparkline({data,color=C.accent,height=40}){
  if(!data||data.length<2) return null;
  const max=Math.max(...data),min=Math.min(...data);
  const range=max-min||1;
  const w=100,h=height;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*h}`).join(" ");
  return<svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height}} preserveAspectRatio="none">
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    <polyline points={`0,${h} ${pts} ${w},${h}`} fill={`${color}18`} stroke="none"/>
  </svg>
}

/* ── GALERIE EDITOR ── */
function GalerieEditor({medias,onChange}){
  const [dragging,setDragging]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [urlInput,setUrlInput]=useState("");
  const [showUrl,setShowUrl]=useState(false);
  const fileRef=useRef();
  const addUrl=url=>{if(!url)return;onChange([...medias,{url,type:isVideo(url)?"video":"image"}])};
  const handleFiles=async files=>{
    setUploading(true);
    try{const up=[];for(const f of Array.from(files)){const folder=f.type.startsWith("video")?"videos":"photos";const url=await uploadFile(f,folder);up.push({url,type:f.type.startsWith("video")?"video":"image"});}onChange([...medias,...up]);}
    catch(e){alert("Upload: "+e.message);}
    setUploading(false);
  };
  const remove=idx=>onChange(medias.filter((_,i)=>i!==idx));
  const moveFirst=idx=>{const c=[...medias];const[item]=c.splice(idx,1);onChange([item,...c])};
  return<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <label style={{fontSize:12,fontWeight:600,color:C.text2,letterSpacing:"0.05em",textTransform:"uppercase"}}>📸 Médias</label>
      <span style={{fontSize:11,color:C.text3}}>{medias.length===0?"Aucun":`${medias.length} fichier${medias.length>1?"s":""} · 1er = vignette`}</span>
    </div>
    {medias.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
      {medias.map((m,i)=><div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:`2px solid ${i===0?C.accent:C.border}`,aspectRatio:"1/1",background:C.surface}}>
        {i===0&&<span style={{position:"absolute",top:4,left:4,background:C.accent,color:"#000",fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,zIndex:2}}>PRINCIPAL</span>}
        {m.type==="video"?<video src={m.url} style={{width:"100%",height:"100%",objectFit:"cover"}} autoPlay muted loop playsInline/>:<img src={m.url} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>}
        <div style={{position:"absolute",top:4,right:4,display:"flex",flexDirection:"column",gap:3}}>
          <button onClick={()=>remove(i)} style={{background:"#ff4757cc",border:"none",borderRadius:4,color:"#fff",cursor:"pointer",width:20,height:20,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          {i>0&&<button onClick={()=>moveFirst(i)} style={{background:"#00e5ffcc",border:"none",borderRadius:4,color:"#000",cursor:"pointer",width:20,height:20,fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>★</button>}
        </div>
      </div>)}
    </div>}
    <div className="drop-zone" onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files)}} onClick={()=>fileRef.current?.click()} style={{borderColor:dragging?C.accent:""}}>
      <input ref={fileRef} type="file" accept="image/*,video/*" multiple onChange={e=>handleFiles(e.target.files)}/>
      {uploading?<div style={{color:C.accent,fontSize:13}}>⏳ Upload...</div>:<div style={{color:C.text3,fontSize:13}}><div style={{fontSize:24,marginBottom:4}}>📂</div><span style={{color:C.accent,fontWeight:600}}>Glisse ici</span> ou clique — photos & vidéos</div>}
    </div>
    <div>
      <button onClick={()=>setShowUrl(v=>!v)} style={{background:"none",border:"none",color:C.text3,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>▼ Ajouter via URL</button>
      {showUrl&&<div style={{display:"flex",gap:8,marginTop:6}}>
        <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://..." onKeyDown={e=>e.key==="Enter"&&(addUrl(urlInput.trim()),setUrlInput(""),setShowUrl(false))} style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:13,padding:"7px 11px",outline:"none"}}/>
        <Btn onClick={()=>{addUrl(urlInput.trim());setUrlInput("");setShowUrl(false)}} style={{padding:"7px 12px",fontSize:12}}>+</Btn>
      </div>}
    </div>
  </div>
}

function DashboardPage({orders,products,setPage}){
  const now=new Date(),thisMonth=now.getMonth(),thisYear=now.getFullYear();
  const active=orders.filter(o=>o.status!=="annulé");
  const totalCA=active.reduce((s,o)=>s+parseFloat(o.total)+parseFloat(o.livraison||0),0);
  const monthOrders=active.filter(o=>{const d=new Date(o.created_at);return d.getMonth()===thisMonth&&d.getFullYear()===thisYear});
  const monthCA=monthOrders.reduce((s,o)=>s+parseFloat(o.total)+parseFloat(o.livraison||0),0);
  const newOrders=orders.filter(o=>o.status==="nouveau").length;
  const shipped=orders.filter(o=>o.status==="expédié").length;
  const avgOrder=active.length?totalCA/active.length:0;
  const lowStock=products.filter(p=>p.stock<50&&p.stock>0).length;
  const outStock=products.filter(p=>p.stock===0).length;

  // Tendance : cette semaine vs semaine précédente
  const weekCA=(offset=0)=>{
    const start=new Date(now);start.setDate(start.getDate()-offset*7-7);
    const end=new Date(now);end.setDate(end.getDate()-offset*7);
    return active.filter(o=>{const d=new Date(o.created_at);return d>=start&&d<=end}).reduce((s,o)=>s+parseFloat(o.total)+parseFloat(o.livraison||0),0);
  };
  const thisWeek=weekCA(0),lastWeek=weekCA(1);
  const weekTrend=lastWeek>0?Math.round(((thisWeek-lastWeek)/lastWeek)*100):0;

  // Top 5 produits vendus
  const topProducts=useMemo(()=>{
    const counts={};
    active.forEach(o=>parseItems(o.items).forEach(i=>{counts[i.name]=(counts[i.name]||0)+i.qty}));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  },[orders]);

  // Sparkline CA 14 jours
  const sparkData=useMemo(()=>{
    const days=14;const data=Array(days).fill(0);
    active.forEach(o=>{const d=new Date(o.created_at);const diff=Math.floor((now-d)/(1000*60*60*24));if(diff<days)data[days-1-diff]+=parseFloat(o.total)+parseFloat(o.livraison||0)});
    return data;
  },[orders]);

  // Commandes en attente de traitement
  const pending=orders.filter(o=>["nouveau","payé"].includes(o.status)).length;

  return<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:34,letterSpacing:"0.05em"}}>Dashboard</div>
        <div style={{fontSize:12,color:C.text3,marginTop:2}}>
          {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})} ·{" "}
          <a href="https://anserfj.github.io/telegram-shop/" target="_blank" style={{color:C.accent,textDecoration:"none"}}>Voir la boutique →</a>
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {pending>0&&<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"#f0b42918",border:`1px solid ${C.gold}33`,borderRadius:8,fontSize:12,color:C.gold,cursor:"pointer"}} onClick={()=>setPage("orders")}>
          ⏳ {pending} à traiter
        </div>}
        <Btn onClick={()=>setPage("orders")} style={{fontSize:12}}>Commandes →</Btn>
      </div>
    </div>

    {/* Stats */}
    <div className="stats-grid">
      <StatCard icon="💰" label="CA total" value={fmt(totalCA)} sub={`${fmt(monthCA)} ce mois`} color={C.accent} trend={weekTrend} onClick={()=>setPage("orders")}/>
      <StatCard icon="📦" label="Commandes" value={String(orders.length)} sub={`${newOrders} nouvelles`} color={C.gold} trend={8} onClick={()=>setPage("orders")}/>
      <StatCard icon="🚚" label="Expédiées" value={String(shipped)} sub={`${active.length} actives`} color={C.green} onClick={()=>setPage("orders")}/>
      <StatCard icon="💳" label="Panier moyen" value={fmt(avgOrder)} sub={`${monthOrders.length} cmd ce mois`} color={C.purple}/>
    </div>

    {/* Alertes */}
    {(lowStock>0||outStock>0)&&<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      {outStock>0&&<div style={{flex:1,minWidth:200,padding:"11px 14px",background:"#ff475710",border:`1px solid ${C.red}33`,borderRadius:10,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setPage("catalog")}>
        <span style={{fontSize:18}}>⚠️</span>
        <div><div style={{fontSize:13,fontWeight:600,color:C.red}}>{outStock} produit{outStock>1?"s":""} épuisé{outStock>1?"s":""}</div><div style={{fontSize:11,color:C.text3}}>Cliquer pour mettre à jour</div></div>
      </div>}
      {lowStock>0&&<div style={{flex:1,minWidth:200,padding:"11px 14px",background:"#ff9f4310",border:`1px solid ${C.orange}33`,borderRadius:10,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setPage("catalog")}>
        <span style={{fontSize:18}}>📉</span>
        <div><div style={{fontSize:13,fontWeight:600,color:C.orange}}>{lowStock} produit{lowStock>1?"s":""} stock faible</div><div style={{fontSize:11,color:C.text3}}>&lt; 50 unités</div></div>
      </div>}
    </div>}

    <div className="dash-grid-2" style={{gap:16}}>
      {/* CA 14 jours */}
      <Card>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em"}}>CA — 14 derniers jours</div>
            <div style={{fontSize:11,color:weekTrend>=0?C.green:C.red,marginTop:2,fontWeight:600}}>{weekTrend>=0?"↑":"↓"} {Math.abs(weekTrend)}% vs semaine précédente</div>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:C.accent}}>{fmt(sparkData.reduce((a,b)=>a+b,0))}</span>
        </div>
        <Sparkline data={sparkData} color={C.accent} height={56}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          <span style={{fontSize:10,color:C.text3}}>J-14</span>
          <span style={{fontSize:10,color:C.text3}}>Aujourd'hui</span>
        </div>
      </Card>

      {/* Statuts */}
      <Card>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:14}}>Statuts</div>
        {Object.entries(STATUS).map(([k,v])=>{const n=orders.filter(o=>o.status===k).length;const pct=orders.length?Math.round(n/orders.length*100):0;return<div key={k} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:v.color,fontSize:12,fontWeight:600}}>{v.label}</span><span style={{color:C.text3,fontSize:11}}>{n}</span></div>
          <div style={{height:4,background:C.border,borderRadius:2}}><div style={{height:"100%",width:`${pct}%`,background:v.color,borderRadius:2,transition:"width .4s"}}/></div>
        </div>})}

    </div>

    <div className="dash-grid-equal" style={{gap:16}}>
      {/* Top produits */}
      <Card>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:14}}>🏆 Top produits</div>
        {topProducts.length===0?<div style={{color:C.text3,fontSize:13}}>Aucune vente</div>:topProducts.map(([name,qty],i)=>{
          const maxQty=topProducts[0][1];
          return<div key={name} style={{marginBottom:10}}>

              <span style={{fontSize:12,color:C.text1}}><span style={{color:C.text3,marginRight:6}}>#{i+1}</span>{name}</span>

      {/* Dernières commandes */}

        {orders.slice(0,5).map((o,i)=><div key={o.id} style={{padding:"10px 18px",borderBottom:i<4?`1px solid ${C.border}`:"none",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setPage("orders")} className="row-hover">
          <div>

  </div>

/* ── ORDERS ── */
function OrdersPage({orders,setOrders,products,setProducts,loading,reload,selectedOrder,setSelectedOrder}){
  const [filter,setFilter]=useState("tous");
  const [search,setSearch]=useState("");
  const [sort,setSort]=useState("date_desc");
  const [selected,setSelected]=useState(null);
  const [updating,setUpdating]=useState(false);
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [note,setNote]=useState("");
  const [savingNote,setSavingNote]=useState(false);

  useEffect(()=>{
    if(selectedOrder&&orders.length>0){const o=orders.find(x=>x.id===selectedOrder);if(o){setSelected(o);setNote(o.note||"");if(setSelectedOrder)setSelectedOrder(null)}}
  },[selectedOrder,orders]);

  useEffect(()=>{if(selected)setNote(selected.note||"")},[selected]);

  // ── Gestion intelligente du stock ──────────────────────────────
  // Stock déduit quand : nouveau → payé
  // Stock remis quand  : annulé (depuis n'importe quel statut sauf nouveau)
  // Stock re-déduit si : annulé → payé
  const updateStatus=async(id,status)=>{
    setUpdating(true);
    try{
      const order=orders.find(o=>o.id===id);
      if(!order){setUpdating(false);return;}
      const prevStatus=order.status;
      await sbPatch("orders",id,{status});
      setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));
      setSelected(prev=>prev?.id===id?{...prev,status}:prev);

      const items=parseItems(order.items);

      // Déduire le stock : nouveau/annulé → payé
      if(status==="payé"&&(prevStatus==="nouveau"||prevStatus==="annulé")){
        for(const item of items){
          const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);
          if(prod[0]){
            const newStock=Math.max(0,prod[0].stock-item.qty);
            await sbPatch("products",prod[0].id,{stock:newStock}).catch(()=>{});
            if(setProducts)setProducts(prev=>prev.map(p=>p.id===prod[0].id?{...p,stock:newStock}:p));
          }
        }
      }
      // Remettre le stock : (payé/traité/expédié) → annulé
      if(status==="annulé"&&prevStatus!=="nouveau"&&prevStatus!=="annulé"){
        for(const item of items){
          const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);
          if(prod[0]){
            const newStock=prod[0].stock+item.qty;
            await sbPatch("products",prod[0].id,{stock:newStock}).catch(()=>{});
            if(setProducts)setProducts(prev=>prev.map(p=>p.id===prod[0].id?{...p,stock:newStock}:p));
          }
        }
      }
    }catch(e){alert(e.message)}
    setUpdating(false);
  };

  const saveNote=async()=>{
    if(!selected)return;setSavingNote(true);
    try{await sbPatch("orders",selected.id,{note});setOrders(prev=>prev.map(o=>o.id===selected.id?{...o,note}:o));setSelected(prev=>prev?{...prev,note}:prev)}
    catch(e){alert(e.message)}
    setSavingNote(false);
  };

  const exportCSV=()=>{
    const rows=[["ID","Client","Date","Total","Livraison","Statut","Articles"],...filtered.map(o=>[o.id,o.telegram_user,new Date(o.created_at).toLocaleDateString("fr-FR"),(parseFloat(o.total)+parseFloat(o.livraison||0)).toFixed(2),o.status,parseItems(o.items).map(i=>`${i.name}×${i.qty}`).join("|")])];
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`commandes_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  const printOrder=o=>{
    const li=o.livraison_info?(typeof o.livraison_info==="string"?JSON.parse(o.livraison_info):o.livraison_info):null;
    const items=parseItems(o.items);
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Commande ${o.id}</title><style>body{font-family:sans-serif;max-width:600px;margin:40px auto;color:#111;font-size:14px}h1{font-size:22px;margin-bottom:4px}table{width:100%;border-collapse:collapse;margin:16px 0}td,th{padding:8px 10px;border:1px solid #ddd;text-align:left}th{background:#f5f5f5}tfoot td{font-weight:700}@media print{button{display:none}}</style></head><body>
    <button onclick="window.print()" style="margin-bottom:20px;padding:8px 16px;cursor:pointer">🖨️ Imprimer</button>
    <h1>Commande ${o.id}</h1><p style="color:#666">${new Date(o.created_at).toLocaleString("fr-FR")} · ${o.telegram_user}</p>
    ${li?`<h3>Livraison</h3><p>${li.prenom||""} ${li.nom||""}<br>${li.adresse||""}<br>${li.cp||""} ${li.ville||""}<br>${li.tel||""}</p>`:""}
    <h3>Articles</h3>
    <table><thead><tr><th>Produit</th><th>Goût</th><th>Qté</th><th>P.U.</th><th>Total</th></tr></thead><tbody>
    ${items.map(i=>`<tr><td>${i.name}</td><td>${i.gout||"-"}</td><td>${i.qty}</td><td>${parseFloat(i.price).toFixed(2)} €</td><td>${(i.qty*i.price).toFixed(2)} €</td></tr>`).join("")}
    </tbody><tfoot><tr><td colspan="4">Livraison</td><td>${parseFloat(o.livraison||0)===0?"Offerte":parseFloat(o.livraison).toFixed(2)+" €"}</td></tr>
    <tr><td colspan="4"><strong>Total TTC</strong></td><td><strong>${(parseFloat(o.total)+parseFloat(o.livraison||0)).toFixed(2)} €</strong></td></tr></tfoot></table>
    <p>Statut : <strong>${o.status}</strong></p>
    ${o.note?`<p>Note : ${o.note}</p>`:""}
    </body></html>`);w.document.close();
  };

  const copyId=id=>{navigator.clipboard.writeText(id).catch(()=>{});/* silent */};

  const [currentPage,setCurrentPage]=useState(1);
  const PAGE_SIZE=20;

  const filtered=useMemo(()=>{
    let r=orders.filter(o=>{
      if(filter!=="tous"&&o.status!==filter)return false;
      if(search&&!o.id.toLowerCase().includes(search.toLowerCase())&&!o.telegram_user.toLowerCase().includes(search.toLowerCase()))return false;
      if(dateFrom&&new Date(o.created_at)<new Date(dateFrom))return false;
      if(dateTo&&new Date(o.created_at)>new Date(dateTo+"T23:59:59"))return false;
      return true;
    });
    if(sort==="date_desc")r.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    else if(sort==="date_asc")r.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    else if(sort==="total_desc")r.sort((a,b)=>parseFloat(b.total)-parseFloat(a.total));
    else if(sort==="total_asc")r.sort((a,b)=>parseFloat(a.total)-parseFloat(b.total));
    return r;
  },[orders,filter,search,sort,dateFrom,dateTo]);

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const paginated=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  const totalFiltered=filtered.reduce((s,o)=>s+parseFloat(o.total)+parseFloat(o.livraison||0),0);

  return<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
      <div style={{fontFamily:"'Bebas Neue'",fontSize:34,letterSpacing:"0.05em"}}>Commandes</div>
      <div style={{display:"flex",gap:8}}>
        <Btn variant="ghost" onClick={exportCSV} style={{fontSize:12}}>📥 CSV</Btn>
        <Btn variant="ghost" onClick={reload} style={{fontSize:12}}>🔄</Btn>
      </div>
    </div>

    {/* Filtres */}
    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher ID, client..." style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:13,padding:"8px 12px",outline:"none",flex:1,minWidth:140}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
      <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text2,fontSize:12,padding:"8px 10px",outline:"none"}}/>

                <td style={{padding:"11px 14px",fontSize:13}}>{o.telegram_user}</td>

            {Array.from({length:Math.min(5,totalPages)},(_, i)=>{

              if(totalPages<=5)p=i+1;

              return<button key={p} onClick={()=>setCurrentPage(p)} style={{width:30,height:30,borderRadius:7,border:`1px solid ${currentPage===p?C.accent:C.border}`,background:currentPage===p?C.accent:"transparent",color:currentPage===p?C.bg:C.text2,cursor:"pointer",fontSize:12,fontWeight:currentPage===p?700:400}}>{p}</button>

          <span style={{fontSize:11,color:C.text3}}>Page {currentPage}/{totalPages} · {filtered.length} résultats</span>

                {selected.telegram_user?.startsWith("@")&&<a href={`https://t.me/${selected.telegram_user.slice(1)}`} target="_blank" style={{fontSize:10,color:C.text2,textDecoration:"none",background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"2px 7px"}}>🔗 Profil</a>}

              <div style={{fontSize:10,color:C.text3,marginTop:5}}>{new Date(selected.created_at).toLocaleString("fr-FR")}</div>

/* ── CLIENTS ── */
function ClientsPage({orders,setOrders}){
  const [clients,setClients]=useState([]);
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState("");
  const [loading,setLoading]=useState(false);
  const [updating,setUpdating]=useState(false);
  const [sortBy,setSortBy]=useState("recent");

  useEffect(()=>{setLoading(true);sbGet("bot_users","?order=last_seen.desc").then(u=>setClients(u)).catch(console.error).finally(()=>setLoading(false));},[]);

  const dn=u=>u.username?`@${u.username}`:`${u.first_name||""}${u.last_name?` ${u.last_name}`:""}`.trim()||`User ${u.id}`;
  const clientOrders=uid=>orders.filter(o=>String(o.telegram_id)===String(uid));
  const ca=uid=>clientOrders(uid).filter(o=>o.status!=="annulé").reduce((s,o)=>s+parseFloat(o.total)+parseFloat(o.livraison||0),0);

  const updateStatus=async(id,status)=>{
    setUpdating(true);
    try{
      const order=orders.find(o=>o.id===id);
      await sbPatch("orders",id,{status});
      setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));
      if(order){
        const prevStatus=order.status;
        const items=parseItems(order.items);
        if(status==="payé"&&(prevStatus==="nouveau"||prevStatus==="annulé")){
          for(const item of items){const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);if(prod[0])await sbPatch("products",prod[0].id,{stock:Math.max(0,prod[0].stock-item.qty)}).catch(()=>{})}
        }
        if(status==="annulé"&&prevStatus!=="nouveau"&&prevStatus!=="annulé"){
          for(const item of items){const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);if(prod[0])await sbPatch("products",prod[0].id,{stock:prod[0].stock+item.qty}).catch(()=>{})}
        }
      }
    }catch(e){alert(e.message)}
    setUpdating(false);
  };

  const sorted=useMemo(()=>{
    let r=[...clients].filter(c=>!search||dn(c).toLowerCase().includes(search.toLowerCase()));
    if(sortBy==="ca")r.sort((a,b)=>ca(b.id)-ca(a.id));
    else if(sortBy==="orders")r.sort((a,b)=>clientOrders(b.id).length-clientOrders(a.id).length);
    else r.sort((a,b)=>new Date(b.last_seen)-new Date(a.last_seen));
    return r;
  },[clients,search,sortBy,orders]);

  return<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:34,letterSpacing:"0.05em"}}>Clients</div>
        <div style={{fontSize:12,color:C.text3,marginTop:2}}>{clients.length} clients · {clients.filter(c=>clientOrders(c.id).length>0).length} ont commandé</div>
      </div>
    </div>

    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher..." style={{flex:1,minWidth:140,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text1,fontSize:13,padding:"8px 12px",outline:"none"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
      <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text2,fontSize:12,padding:"8px 10px",outline:"none",cursor:"pointer"}}>
        <option value="recent">Plus récent</option>
        <option value="ca">CA ↓</option>
        <option value="orders">Commandes ↓</option>
      </select>
    </div>

    {loading?<div style={{padding:60,display:"flex",justifyContent:"center"}}><div className="spinner"/></div>:
    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:260}}>
        {sorted.map(c=>{
          const nb=clientOrders(c.id).length,caVal=ca(c.id),isSel=selected?.id===c.id;
          return<div key={c.id} onClick={()=>setSelected(isSel?null:c)} className="row-hover" style={{padding:"13px 16px",background:isSel?C.accentDim:C.card,border:`1px solid ${isSel?C.accentMid:C.border}`,borderRadius:10,marginBottom:8,cursor:"pointer",transition:"all .15s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,borderRadius:10,background:C.accentDim,border:`1px solid ${C.accentMid}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:isSel?C.accent:C.text1}}>{dn(c)}</div>
                  <div style={{fontSize:11,color:C.text3}}>Depuis {new Date(c.started_at).toLocaleDateString("fr-FR")} · Vu {new Date(c.last_seen).toLocaleDateString("fr-FR")}</div>
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{caVal>0?fmt(caVal):"—"}</div>
                <div style={{fontSize:11,color:C.text3}}>{nb} cmd{nb>1?"s":""}</div>
              </div>
            </div>
            {nb>0&&<div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
              {clientOrders(c.id).slice(0,3).map(o=><span key={o.id} style={{fontSize:10,padding:"2px 7px",background:STATUS[o.status]?.bg||C.accentDim,color:STATUS[o.status]?.color||C.accent,borderRadius:4,border:`1px solid ${STATUS[o.status]?.color||C.accent}33`}}>{o.id}</span>)}
              {nb>3&&<span style={{fontSize:10,color:C.text3}}>+{nb-3}</span>}
            </div>}
            {c.username&&<div style={{display:"flex",gap:5,marginTop:7}}>
              <a href={`https://t.me/${c.username}`} target="_blank" onClick={e=>e.stopPropagation()} style={{fontSize:10,color:C.accent,textDecoration:"none",background:C.accentDim,border:`1px solid ${C.accentMid}`,borderRadius:4,padding:"2px 7px"}}>🔗 Profil</a>
              <a href={`https://t.me/zkprobo_bot?start=user_${c.id}`} target="_blank" onClick={e=>e.stopPropagation()} style={{fontSize:10,color:C.green,textDecoration:"none",background:"#00e67612",border:"1px solid #00e67630",borderRadius:4,padding:"2px 7px"}}>💬 Contacter</a>
            </div>}
          </div>
        })}
        {sorted.length===0&&<div style={{padding:40,textAlign:"center",color:C.text3,fontSize:13}}>Aucun client</div>}
      </div>

      {selected&&<div className="scale-in" style={{width:"100%",maxWidth:340,flexShrink:0}}>
        <Card style={{padding:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700}}>{dn(selected)}</div>
            <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18}}>×</button>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            <div style={{flex:1,padding:"10px",background:C.surface,borderRadius:8,textAlign:"center"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:C.accent}}>{fmt(ca(selected.id))}</div>
              <div style={{fontSize:11,color:C.text3}}>CA total</div>
            </div>
            <div style={{flex:1,padding:"10px",background:C.surface,borderRadius:8,textAlign:"center"}}>
              <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:C.gold}}>{clientOrders(selected.id).length}</div>
              <div style={{fontSize:11,color:C.text3}}>Commandes</div>
            </div>
          </div>
          <div style={{fontSize:11,color:C.text3,marginBottom:10,textTransform:"uppercase",letterSpacing:".06em"}}>Historique</div>
          <div style={{maxHeight:400,overflowY:"auto"}}>
            {clientOrders(selected.id).length===0
              ?<div style={{textAlign:"center",padding:20,color:C.text3,fontSize:13}}>Aucune commande</div>
              :clientOrders(selected.id).map(o=><div key={o.id} style={{marginBottom:10,padding:"10px 12px",background:C.surface,borderRadius:8,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontFamily:"'JetBrains Mono'",fontSize:11,color:C.accent}}>{o.id}</span>
                  <span style={{fontSize:11,fontWeight:700}}>{fmt(parseFloat(o.total)+parseFloat(o.livraison||0))}</span>
                </div>
                <div style={{fontSize:11,color:C.text3,marginBottom:7}}>{new Date(o.created_at).toLocaleDateString("fr-FR")} · <Badge status={o.status}/></div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {Object.entries(STATUS).map(([key,cfg])=><button key={key} onClick={()=>updateStatus(o.id,key)} disabled={updating||o.status===key} style={{padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600,cursor:o.status===key?"default":"pointer",border:`1px solid ${o.status===key?cfg.color:C.border}`,background:o.status===key?cfg.bg:"transparent",color:o.status===key?cfg.color:C.text3,fontFamily:"'DM Sans',sans-serif"}}>{cfg.label}</button>)}
                </div>
              </div>)
            }
          </div>
        </Card>
      </div>}
    </div>}
  </div>
}

/* ── CATALOG ── */
const EMPTY={name:"",cat:"puff",emoji:"💨",price:"",compare_price:"",unit:"/ unité",min_qty:"10",badge:"",stock:"",low_stock_alert:"50",gouts:[],medias:[]};

function CatalogPage({products,setProducts,loading,reload}){
  const [filter,setFilter]=useState("tous");
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(EMPTY);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState("");
  const [bulkSelected,setBulkSelected]=useState([]);
  const [view,setView]=useState("grid"); // grid | list

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500)};
  const setF=patch=>setForm(f=>({...f,...patch}));

  const openNew=()=>{setForm(EMPTY);setModal("new")};
  const openEdit=p=>{
    const em=[];
    if(p.image_url)em.push({url:p.image_url,type:"image"});
    if(p.video_url)em.push({url:p.video_url,type:"video"});
    const gal=Array.isArray(p.gallery)?p.gallery:(p.gallery?JSON.parse(p.gallery||"[]"):[]);
    gal.forEach(url=>{if(url&&!em.find(m=>m.url===url))em.push({url,type:isVideo(url)?"video":"image"})});
    setForm({name:p.name,cat:p.cat,emoji:p.emoji||"💨",price:String(p.price),compare_price:String(p.compare_price||""),unit:p.unit,min_qty:String(p.min_qty),badge:p.badge||"",stock:String(p.stock),low_stock_alert:String(p.low_stock_alert||"50"),gouts:Array.isArray(p.gouts)?p.gouts:(p.gouts?JSON.parse(p.gouts):[]),medias:em});
    setModal(p);
  };

  const save=async()=>{
    if(!form.name||!form.price)return;
    setSaving(true);
    const firstImg=form.medias.find(m=>m.type==="image");
    const firstVid=form.medias.find(m=>m.type==="video");
    const gallery=form.medias.filter(m=>m!==firstImg&&m!==firstVid).map(m=>m.url);
    const body={name:form.name,cat:form.cat,emoji:form.emoji,price:parseFloat(form.price),compare_price:form.compare_price?parseFloat(form.compare_price):null,unit:form.unit,min_qty:parseInt(form.min_qty)||1,stock:parseInt(form.stock)||0,low_stock_alert:parseInt(form.low_stock_alert)||50,badge:form.badge||null,gouts:form.gouts,image_url:firstImg?.url||null,video_url:firstVid?.url||null,gallery};
    try{
      if(modal==="new"){const[r]=await sbPost("products",body);setProducts(prev=>[...prev,r]);showToast("✅ Produit ajouté !")}
      else{await sbPatch("products",modal.id,body);setProducts(prev=>prev.map(p=>p.id===modal.id?{...p,...body,id:modal.id}:p));showToast("✅ Modifié !")}
      setModal(null);
    }catch(e){alert("Erreur: "+e.message)}
    setSaving(false);
  };

  const remove=async id=>{if(!confirm("Supprimer ?"))return;try{await sbDelete("products",id);setProducts(prev=>prev.filter(p=>p.id!==id));showToast("🗑️ Supprimé")}catch(e){alert(e.message)}};

  const duplicate=async p=>{
    const body={name:`${p.name} (copie)`,cat:p.cat,emoji:p.emoji,price:p.price,compare_price:p.compare_price||null,unit:p.unit,min_qty:p.min_qty,stock:0,badge:null,gouts:p.gouts||[],image_url:p.image_url||null,video_url:p.video_url||null,gallery:p.gallery||[]};
    try{const[r]=await sbPost("products",body);setProducts(prev=>[...prev,r]);showToast("✅ Dupliqué — stock mis à 0")}catch(e){alert(e.message)}
  };

  const bulkUpdateBadge=async badge=>{
    for(const id of bulkSelected){try{await sbPatch("products",id,{badge:badge||null});setProducts(prev=>prev.map(p=>bulkSelected.includes(p.id)?{...p,badge:badge||null}:p))}catch(e){}}
    setBulkSelected([]);showToast(`✅ ${bulkSelected.length} produits mis à jour`);
  };

  const updateStock=async(p,newStock)=>{
    try{await sbPatch("products",p.id,{stock:newStock});setProducts(prev=>prev.map(x=>x.id===p.id?{...x,stock:newStock}:x))}catch(e){alert(e.message)}
  };

  const filtered=useMemo(()=>{
    let r=products;
    if(filter!=="tous")r=r.filter(p=>p.cat===filter);

  return<div className="fade-in" style={{display:"flex",flexDirection:"column",gap:16,position:"relative"}}>

    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>

      <div style={{display:"flex",gap:8}}>

        <Btn variant="ghost" onClick={reload} style={{fontSize:12}}>🔄</Btn>
        <Btn onClick={openNew}>+ Produit</Btn>
      </div>

    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

      {["tous","puff","recharge","accessoire"].map(c=><button key={c} onClick={()=>setFilter(c)} style={{padding:"6px 14px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"capitalize",background:filter===c?C.accent:"transparent",color:filter===c?C.bg:C.text2,border:`1px solid ${filter===c?C.accent:C.border}`,fontFamily:"'DM Sans',sans-serif"}}>{c}</button>)}

    {loading?<div style={{padding:60,display:"flex",justifyContent:"center"}}><div className="spinner"/></div>:

    view==="list"?(

            {filtered.map((p,i)=>{

              return<tr key={p.id} style={{borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}} className="row-hover">
                <td style={{padding:"10px 14px"}}><input type="checkbox" checked={bulkSelected.includes(p.id)} onChange={e=>{e.stopPropagation();setBulkSelected(prev=>e.target.checked?[...prev,p.id]:prev.filter(x=>x!==p.id))}}/></td>
                <td style={{padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:40,height:40,borderRadius:8,background:C.surface,flexShrink:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {mainImg?<img src={mainImg} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:20}}>{p.emoji||"💨"}</span>}
                    </div>

                <td style={{padding:"10px 14px",fontSize:12,color:C.text2,textTransform:"capitalize"}}>{p.cat}</td>
                <td style={{padding:"10px 14px"}}>
                  <div style={{fontSize:13,fontWeight:700,color:C.accent}}>{fmt(p.price)}</div>

                </td>
                <td style={{padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:14,fontWeight:700,color:p.stock===0?C.red:p.stock<50?C.orange:C.green}}>{p.stock}</span>

                  </div>
                </td>
                <td style={{padding:"10px 14px"}}>{p.badge&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:p.badge==="new"?"#00e67618":p.badge==="promo"?"#ff475718":"#f0b42918",color:p.badge==="new"?C.green:p.badge==="promo"?C.red:C.gold,border:`1px solid currentColor`,fontWeight:700,textTransform:"uppercase"}}>{p.badge}</span>}</td>
                <td style={{padding:"10px 14px"}}>
                  <div style={{display:"flex",gap:6}}>
                    <Btn variant="ghost" style={{padding:"4px 10px",fontSize:11}} onClick={()=>openEdit(p)}>✏️</Btn>

          </tbody>
        </table>
      </Card>
    ):(
      <div className="catalog-grid">
        {filtered.map(p=>{
          const gouts=Array.isArray(p.gouts)?p.gouts:(p.gouts?JSON.parse(p.gouts):[]);
          const mainImg=p.image_url;const mainVid=p.video_url;
          const epuise=p.stock===0;const faible=!epuise&&p.stock<(p.low_stock_alert||50);
          const discount=p.compare_price&&p.compare_price>p.price?Math.round((1-p.price/p.compare_price)*100):0;
          return<Card key={p.id} style={{padding:0,overflow:"hidden",cursor:"pointer"}} onClick={()=>openEdit(p)}>
            <div style={{height:130,background:C.surface,position:"relative",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {mainVid?<video src={mainVid} style={{width:"100%",height:"100%",objectFit:"cover"}} autoPlay muted loop playsInline/>
               :mainImg?<img src={mainImg} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
               :<span style={{fontSize:40}}>{p.emoji||"💨"}</span>}
              {epuise&&<div style={{position:"absolute",inset:0,background:"#00000066",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{background:C.red,color:"#fff",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:5}}>ÉPUISÉ</span></div>}
              {!epuise&&faible&&<span style={{position:"absolute",top:6,left:6,background:C.orange,color:"#000",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3}}>STOCK FAIBLE</span>}
              {!epuise&&!faible&&p.badge&&<span style={{position:"absolute",top:6,left:6,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3,background:p.badge==="new"?C.green:p.badge==="promo"?C.red:p.badge==="top"?C.accent:C.orange,color:"#000",textTransform:"uppercase"}}>{p.badge}</span>}
              {discount>0&&<span style={{position:"absolute",top:6,right:6,background:C.red,color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3}}>-{discount}%</span>}
              <input type="checkbox" checked={bulkSelected.includes(p.id)} onChange={e=>{e.stopPropagation();setBulkSelected(prev=>e.target.checked?[...prev,p.id]:prev.filter(x=>x!==p.id))}} onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:6,right:6,width:16,height:16,cursor:"pointer"}}/>
            </div>
            <div style={{padding:12}}>
              <div style={{fontSize:10,color:C.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:2}}>{p.cat}</div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4,lineHeight:1.3}}>{p.name}</div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                <span style={{fontFamily:"'Bebas Neue'",fontSize:18,color:C.accent}}>{fmt(p.price)}</span>
                {p.compare_price&&<span style={{fontSize:11,color:C.text3,textDecoration:"line-through"}}>{fmt(p.compare_price)}</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:11,color:p.stock===0?C.red:p.stock<50?C.orange:C.green,fontWeight:600}}>Stock: {p.stock}</span>
                {gouts.length>0&&<span style={{fontSize:10,color:C.accent}}>{gouts.length} goûts</span>}
              </div>
              <div style={{display:"flex",gap:6,marginTop:8}} onClick={e=>e.stopPropagation()}>
                <Btn variant="ghost" style={{flex:1,justifyContent:"center",padding:"5px",fontSize:11}} onClick={()=>openEdit(p)}>✏️</Btn>
                <Btn variant="ghost" style={{padding:"5px 8px",fontSize:11}} title="Dupliquer" onClick={()=>duplicate(p)}>⧉</Btn>
                <Btn variant="danger" style={{padding:"5px 8px",fontSize:11}} onClick={()=>remove(p.id)}>🗑</Btn>
              </div>
            </div>
          </Card>
        })}
      </div>
    )}

    {/* MODAL PRODUIT */}
    {modal&&<div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:500}} onClick={()=>setModal(null)}>
      <div className="scale-in" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:600,maxHeight:"94vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:22,letterSpacing:"0.05em"}}>{modal==="new"?"Nouveau produit":"Modifier : "+form.name}</div>
          <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:20}}>×</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"grid",gridTemplateColumns:"70px 1fr",gap:10}}>
            <Inp label="Emoji" value={form.emoji} onChange={v=>setF({emoji:v})}/>
            <Inp label="Nom" value={form.name} onChange={v=>setF({name:v})} placeholder="Ex: Elf Bar 600" required/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Sel label="Catégorie" value={form.cat} onChange={v=>setF({cat:v})} options={[{value:"puff",label:"Puff"},{value:"recharge",label:"Recharge"},{value:"accessoire",label:"Accessoire"}]}/>
            <Sel label="Badge" value={form.badge} onChange={v=>setF({badge:v})} options={[{value:"",label:"Aucun"},{value:"new",label:"🆕 Nouveau"},{value:"promo",label:"🔥 Promo"},{value:"top",label:"⭐ Top"},{value:"stock",label:"⚠️ Stock faible"}]}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Prix (€)" type="number" value={form.price} onChange={v=>setF({price:v})} required min="0" note="Prix de vente"/>
            <Inp label="Prix barré (€)" type="number" value={form.compare_price} onChange={v=>setF({compare_price:v})} min="0" note="Optionnel — affiche -X%"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <Inp label="Stock" type="number" value={form.stock} onChange={v=>setF({stock:v})} min="0"/>
            <Inp label="Alerte stock" type="number" value={form.low_stock_alert} onChange={v=>setF({low_stock_alert:v})} min="0" note="Seuil stock faible"/>
            <Inp label="Qté min." type="number" value={form.min_qty} onChange={v=>setF({min_qty:v})} min="1"/>
          </div>
          <Inp label="Unité" value={form.unit} onChange={v=>setF({unit:v})} placeholder="/ unité"/>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}><GalerieEditor medias={form.medias} onChange={medias=>setF({medias})}/></div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}><GoutsEditor gouts={form.gouts} onChange={gouts=>setF({gouts})}/></div>
        </div>
        <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
          <Btn variant="ghost" onClick={()=>setModal(null)}>Annuler</Btn>
          <Btn onClick={save} disabled={saving||!form.name||!form.price}>{saving?"Sauvegarde...":modal==="new"?"✅ Créer":"✅ Enregistrer"}</Btn>
        </div>
      </div>
    </div>}
  </div>
}

/* ── MESSAGES ── */
function MessagesPage({onRead,onGoToOrder,orders=[],setOrders}){
  const [users,setUsers]=useState([]);
  const [messages,setMessages]=useState([]);
  const [selected,setSelected]=useState(null);
  const [loading,setLoading]=useState(false);
  const [reply,setReply]=useState("");
  const [replyFile,setReplyFile]=useState(null);
  const [sending,setSending]=useState(false);
  const [broadcast,setBroadcast]=useState("");
  const [broadcastFile,setBroadcastFile]=useState(null);
  const [broadcasting,setBroadcasting]=useState(false);
  const [tab,setTab]=useState("inbox");
  const [toast,setToast]=useState("");
  const [showOrders,setShowOrders]=useState(false);
  const [updatingO,setUpdatingO]=useState(false);
  const messagesEndRef=useRef(null);
  const fileRef=useRef(null);
  const broadcastFileRef=useRef(null);
  const messagesContainerRef=useRef(null);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500)};
  const readIds=()=>JSON.parse(localStorage.getItem("zkpro_read_ids")||"[]");
  const userMessages=uid=>messages.filter(m=>m.telegram_id===uid).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const lastMsg=u=>{const ms=messages.filter(m=>m.telegram_id===u.id);if(!ms.length)return null;return ms.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0]};
  const unreadForUser=uid=>messages.filter(m=>m.telegram_id===uid&&m.direction==="in"&&!readIds().includes(m.id)).length;
  const dn=u=>u.username?`@${u.username}`:`${u.first_name||""}${u.last_name?` ${u.last_name}`:""}`.trim()||`User ${u.id}`;
  const sortedUsers=useMemo(()=>[...users].sort((a,b)=>{const la=lastMsg(a),lb=lastMsg(b);if(!la&&!lb)return 0;if(!la)return 1;if(!lb)return -1;return new Date(lb.created_at)-new Date(la.created_at)}),[users,messages]);

  const markRead=(uid,msgs)=>{
    const ids=(msgs||messages).filter(m=>m.telegram_id===uid&&m.direction==="in").map(m=>m.id);
    const merged=[...new Set([...readIds(),...ids])].slice(-1000);
    localStorage.setItem("zkpro_read_ids",JSON.stringify(merged));
    if(onRead)onRead();
  };
  const markAllRead=msgs=>{
    const ids=msgs.filter(m=>m.direction==="in").map(m=>m.id);
    const merged=[...new Set([...readIds(),...ids])].slice(-1000);
    localStorage.setItem("zkpro_read_ids",JSON.stringify(merged));
    if(onRead)onRead();
  };

  const fetchData=async(silent=false)=>{
    if(!silent)setLoading(true);
    try{
      const[u,m]=await Promise.all([sbGet("bot_users","?order=last_seen.desc"),sbGet("bot_messages","?order=created_at.desc&limit=500")]);
      setUsers(u);setMessages(m);
      if(!silent)markAllRead(m);
    }catch(e){console.error(e)}
    if(!silent)setLoading(false);
  };

  useEffect(()=>{fetchData()},[]);
  useEffect(()=>{const t=setInterval(()=>fetchData(true),5000);return()=>clearInterval(t)},[]);
  useEffect(()=>{if(messagesEndRef.current)messagesEndRef.current.scrollIntoView({behavior:"smooth"})},[messages,selected]);
  useEffect(()=>{if(selected)markRead(selected.id)},[selected]);

  // IntersectionObserver pour marquer lus quand visibles
  useEffect(()=>{
    if(!selected||!messagesContainerRef.current)return;
    const container=messagesContainerRef.current;
    const observer=new IntersectionObserver(entries=>{
      const ids=entries.filter(e=>e.isIntersecting).map(e=>parseInt(e.target.dataset.msgid)).filter(Boolean);
      if(ids.length){const merged=[...new Set([...readIds(),...ids])].slice(-1000);localStorage.setItem("zkpro_read_ids",JSON.stringify(merged));if(onRead)onRead()}
    },{root:container,threshold:0.5});
    container.querySelectorAll("[data-direction='in']").forEach(el=>observer.observe(el));
    return()=>observer.disconnect();
  },[selected,messages]);

  const deleteMsg=async msg=>{
    if(msg.direction==="out"&&msg.tg_message_id){try{await fetch(`${TG_API}/deleteMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:msg.telegram_id,message_id:msg.tg_message_id})})}catch(e){}}
    try{await fetch(`${SB_URL}/rest/v1/bot_messages?id=eq.${msg.id}`,{method:"DELETE",headers:SBH});setMessages(prev=>prev.filter(m=>m.id!==msg.id))}catch(e){}
  };

  const sendReply=async()=>{
    if(!selected||(!reply.trim()&&!replyFile))return;
    setSending(true);
    try{
      let tgMsgId=null,displayText=reply.trim();
      if(replyFile){tgMsgId=await sendTgFile(selected.id,replyFile);if(reply.trim())await sendTgMsg(selected.id,reply.trim());displayText=`📎 ${replyFile.name}${reply.trim()?` — ${reply.trim()}`:""}` }
      else{tgMsgId=await sendTgMsg(selected.id,reply.trim())}
      const newMsg={id:Date.now(),telegram_id:selected.id,direction:"out",text:displayText,tg_message_id:tgMsgId,created_at:new Date().toISOString()};
      await fetch(`${SB_URL}/rest/v1/bot_messages`,{method:"POST",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({telegram_id:selected.id,direction:"out",text:displayText,tg_message_id:tgMsgId})});
      await fetch(`${SB_URL}/rest/v1/bot_users?id=eq.${selected.id}`,{method:"PATCH",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({last_seen:new Date().toISOString()})});
      setMessages(prev=>[...prev,newMsg]);
      setUsers(prev=>prev.map(u=>u.id===selected.id?{...u,last_seen:new Date().toISOString()}:u));
      setReply("");setReplyFile(null);if(fileRef.current)fileRef.current.value="";
      showToast("✅ Envoyé !");
    }catch(e){alert("Erreur: "+e.message)}
    setSending(false);
  };

  const sendBroadcast=async()=>{
    if(!broadcast.trim()&&!broadcastFile)return;
    if(!confirm(`Envoyer à ${users.length} utilisateurs ?`))return;
    setBroadcasting(true);let ok=0,fail=0;
    const sentAt=new Date().toISOString();
    const displayText=broadcastFile?`📎 ${broadcastFile.name}${broadcast.trim()?` — ${broadcast.trim()}`:""}`:broadcast.trim();
    for(const u of users){
      try{
        let tgMsgId=null;
        if(broadcastFile){tgMsgId=await sendTgFile(u.id,broadcastFile);if(broadcast.trim())await sendTgMsg(u.id,broadcast.trim())}
        else{tgMsgId=await sendTgMsg(u.id,broadcast.trim())}
        await fetch(`${SB_URL}/rest/v1/bot_messages`,{method:"POST",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify({telegram_id:u.id,direction:"out",text:displayText,tg_message_id:tgMsgId,created_at:sentAt,is_broadcast:true})});
        ok++;
      }catch(e){fail++}
      await new Promise(r=>setTimeout(r,50));
    }
    showToast(`✅ ${ok} envoyés${fail>0?` · ${fail} échecs`:""}`);
    setBroadcast("");setBroadcastFile(null);if(broadcastFileRef.current)broadcastFileRef.current.value="";
    setBroadcasting(false);fetchData();
  };

  const broadcastGroups=()=>{
    const out=messages.filter(m=>m.direction==="out"&&m.is_broadcast===true);
    const groups={};
    out.forEach(m=>{const key=m.text+"|"+m.created_at.slice(0,16);if(!groups[key])groups[key]={text:m.text,created_at:m.created_at,msgs:[]};groups[key].msgs.push(m)});
    return Object.values(groups).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  };

  const deleteBroadcastGroup=async group=>{
    if(!confirm(`Supprimer ce broadcast pour ${group.msgs.length} utilisateurs ?`))return;
    for(const m of group.msgs){
      if(m.tg_message_id){try{await fetch(`${TG_API}/deleteMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:m.telegram_id,message_id:m.tg_message_id})})}catch(e){}}
      try{await fetch(`${SB_URL}/rest/v1/bot_messages?id=eq.${m.id}`,{method:"DELETE",headers:SBH})}catch(e){}
    }
    setMessages(prev=>prev.filter(m=>!group.msgs.find(gm=>gm.id===m.id)));
    showToast("🗑️ Broadcast supprimé");
  };

  const getOrderId=text=>text?.match(/CMD-\d+/)?.[0]||null;

  const renderMessage=m=>{
    const orderId=getOrderId(m.text);
    const isOrderCard=m.direction==="out"&&orderId&&m.text?.includes("Récap commande");
    if(isOrderCard)return<div onClick={()=>onGoToOrder&&onGoToOrder(orderId)} style={{padding:"10px 13px",background:C.bg,border:`1.5px solid ${C.accentMid}`,borderRadius:12,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=C.accentMid}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>🧾</span><span style={{fontSize:12,fontWeight:700,color:C.accent}}>{orderId}</span></div>
      <div style={{fontSize:11,color:C.text2}}>Récap commande · <span style={{color:C.accent}}>Voir →</span></div>
    </div>;

    // Détecter le type via media_type (worker v3) ou fallback extension URL
    const mt = m.media_type;
    const url = m.media_url;
    const isImg  = url && (mt==="image"  || (!mt && /\.(jpg|jpeg|png|webp|gif|webp)(\?|$)/i.test(url)));
    const isVid  = url && (mt==="video"  || (!mt && /\.(mp4|webm|mov|avi)(\?|$)/i.test(url)));
    const isAud  = url && (mt==="audio"  || (!mt && /\.(ogg|oga|mp3|m4a|wav|aac)(\?|$)/i.test(url)));
    const isFile = url && (mt==="file"   || (!mt && !isImg && !isVid && !isAud));

    const bubble = <div style={{padding:url?"6px":"9px 13px",borderRadius:m.direction==="out"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.direction==="out"?C.accent:C.surface,color:m.direction==="out"?C.bg:C.text1,fontSize:13,lineHeight:1.5,wordBreak:"break-word",overflow:"hidden"}}>
      {isImg&&<img src={url} alt="" style={{width:"100%",maxWidth:240,borderRadius:8,display:"block",cursor:"pointer",marginBottom:m.text&&m.text!=="📷 Photo"?4:0}} onClick={()=>window.open(url,"_blank")}/>}
      {isVid&&<video src={url} controls style={{width:"100%",maxWidth:240,borderRadius:8,display:"block",marginBottom:m.text&&m.text!=="🎬 Vidéo"&&m.text!=="⏺ Vidéo bulle"?4:0}}/>}
      {isAud&&<div style={{padding:"6px 4px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{fontSize:18}}>{m.text?.includes("🎤")?"🎤":"🎵"}</span>
          <span style={{fontSize:12,fontWeight:600,opacity:.9}}>{m.text||"Audio"}</span>
        </div>
        <audio controls src={url} style={{width:"100%",height:32,borderRadius:8}}/>
      </div>}
      {isFile&&<a href={url} target="_blank" style={{display:"flex",alignItems:"center",gap:7,padding:"4px 2px",color:m.direction==="out"?C.bg:C.accent,textDecoration:"none",marginBottom:m.text?4:0}}>
        <span style={{fontSize:18}}>📎</span><span style={{fontSize:12,fontWeight:600,textDecoration:"underline"}}>{m.text?.replace("📎 ","")}</span>
      </a>}
      {m.text&&!isAud&&!isFile&&m.text!=="📷 Photo"&&m.text!=="🎬 Vidéo"&&m.text!=="⏺ Vidéo bulle"&&<span style={{padding:url?"0 4px 4px":0,display:"block"}}>{m.text}</span>}
    </div>;
    return bubble;
  };

  const clientOrders=selected?orders.filter(o=>String(o.telegram_id)===String(selected.id)):[];
  const updateOrderStatus=async(id,status)=>{
    setUpdatingO(true);
    try{
      const order=orders.find(o=>o.id===id);
      await sbPatch("orders",id,{status});
      if(setOrders)setOrders(prev=>prev.map(o=>o.id===id?{...o,status}:o));
      if(order){
        const prevStatus=order.status;
        const items=parseItems(order.items);
        if(status==="payé"&&(prevStatus==="nouveau"||prevStatus==="annulé")){
          for(const item of items){const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);if(prod[0])await sbPatch("products",prod[0].id,{stock:Math.max(0,prod[0].stock-item.qty)}).catch(()=>{})}
        }
        if(status==="annulé"&&prevStatus!=="nouveau"&&prevStatus!=="annulé"){
          for(const item of items){const prod=await sbGet("products",`?name=eq.${encodeURIComponent(item.name)}&select=id,stock`).catch(()=>[]);if(prod[0])await sbPatch("products",prod[0].id,{stock:prod[0].stock+item.qty}).catch(()=>{})}
        }
      }
    }catch(e){}
    setUpdatingO(false);
  };

  return<div className="fade-in" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 64px)"}}>
    <Toast msg={toast}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexShrink:0,flexWrap:"wrap",gap:8}}>
      <div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:34,letterSpacing:"0.05em"}}>Messages</div>
        <div style={{fontSize:12,color:C.text3}}>{users.length} utilisateurs · {messages.filter(m=>m.direction==="in").length} reçus</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn variant="ghost" onClick={()=>fetchData()} style={{fontSize:12}}>🔄</Btn>
        <div style={{display:"flex",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
          {["inbox","broadcast"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"7px 14px",background:tab===t?C.accent:"transparent",color:tab===t?C.bg:C.text2,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
            {t==="inbox"?"💬 Inbox":"📢 Broadcast"}
          </button>)}
        </div>
      </div>
    </div>

    {loading?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div>:

    tab==="broadcast"?(
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{maxWidth:580}}>
          <Card style={{marginBottom:16}}>
            <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:4}}>Envoyer à tous</div>
            <div style={{fontSize:12,color:C.text3,marginBottom:14}}>{users.length} utilisateurs</div>
            {broadcastFile&&<div style={{padding:"7px 11px",background:C.accentDim,border:`1px solid ${C.accentMid}`,borderRadius:7,marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:C.accent}}>📎 {broadcastFile.name}</span>
              <button onClick={()=>{setBroadcastFile(null);broadcastFileRef.current.value=""}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14}}>×</button>
            </div>}
            <textarea value={broadcast} onChange={e=>setBroadcast(e.target.value)} placeholder="Message... (*gras*, _italique_)" style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:9,color:C.text1,fontSize:14,padding:"11px 13px",outline:"none",resize:"vertical",minHeight:90,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box"}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10,gap:10}}>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>broadcastFileRef.current?.click()} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:7,color:C.text2,cursor:"pointer",padding:"6px 11px",fontSize:12}}>📎 Fichier</button>
                <input ref={broadcastFileRef} type="file" accept="image/*,video/*,application/pdf,.doc,.docx" style={{display:"none"}} onChange={e=>setBroadcastFile(e.target.files[0]||null)}/>
              </div>
              <Btn onClick={sendBroadcast} disabled={broadcasting||(!broadcast.trim()&&!broadcastFile)}>{broadcasting?"⏳ Envoi...":`📢 Envoyer à ${users.length}`}</Btn>
            </div>
          </Card>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:"0.05em",marginBottom:10,color:C.text2}}>Historique ({broadcastGroups().length})</div>
          {broadcastGroups().map((g,i)=><div key={i} style={{padding:"13px 15px",background:C.card,border:`1px solid ${C.border}`,borderRadius:9,marginBottom:9}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:7}}>
              <div style={{fontSize:13,color:C.text1,lineHeight:1.5,whiteSpace:"pre-wrap",flex:1}}>{g.text}</div>
              <button onClick={()=>deleteBroadcastGroup(g)} style={{background:"none",border:`1px solid ${C.red}33`,borderRadius:5,color:C.red,cursor:"pointer",fontSize:10,padding:"3px 8px",flexShrink:0}}>🗑️</button>
            </div>
            <div style={{display:"flex",gap:8}}>
              <span style={{fontSize:11,color:C.text3}}>{new Date(g.created_at).toLocaleString("fr-FR")}</span>
              <span style={{fontSize:11,background:C.accentDim,color:C.accent,border:`1px solid ${C.accentMid}`,borderRadius:4,padding:"1px 7px"}}>📢 {g.msgs.length} dest.</span>
            </div>
          </div>)}
        </div>
      </div>
    ):(
      <div className="inbox-wrap" style={{border:`1px solid ${C.border}`}}>
        {/* Liste */}
        <div className="inbox-users" style={{width:270,flexShrink:0,background:C.surface,borderRight:`1px solid ${C.border}`,overflowY:"auto"}}>
          {sortedUsers.length===0&&<div style={{padding:24,textAlign:"center",color:C.text3,fontSize:13}}>Aucun utilisateur</div>}
          {sortedUsers.map(u=>{
            const last=lastMsg(u),isSelected=selected?.id===u.id,unread=unreadForUser(u.id);
            return<div key={u.id} onClick={()=>{setSelected(u);setShowOrders(false);markRead(u.id)}} style={{padding:"11px 14px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,background:isSelected?C.accentDim:"transparent",borderLeft:isSelected?`3px solid ${C.accent}`:"3px solid transparent",transition:"background .1s"}} onMouseEnter={e=>!isSelected&&(e.currentTarget.style.background="#ffffff06")} onMouseLeave={e=>!isSelected&&(e.currentTarget.style.background="transparent")}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
                <span style={{fontSize:13,fontWeight:600,color:isSelected?C.accent:C.text1}}>{dn(u)}</span>
                {unread>0&&<span style={{background:C.red,color:"#fff",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 6px"}}>{unread}</span>}
              </div>
              {last&&<div style={{fontSize:11,color:C.text3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{last.direction==="out"?"✓ ":""}{last.text}</div>}
              <div style={{fontSize:10,color:C.text3,marginTop:2}}>{new Date(u.last_seen).toLocaleDateString("fr-FR")}</div>
            </div>
          })}
        </div>

        {/* Conversation */}
        <div style={{flex:1,display:"flex",flexDirection:"column",background:C.card,minHeight:0}}>
          {!selected?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.text3,fontSize:14}}>← Sélectionne une conversation</div>:<>
            {/* Header */}
            <div style={{padding:"11px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{dn(selected)}</div>
                <div style={{fontSize:10,color:C.text3}}>Depuis {new Date(selected.started_at).toLocaleDateString("fr-FR")}</div>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>setShowOrders(v=>!v)} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:showOrders?C.accentDim:"transparent",border:`1px solid ${showOrders?C.accentMid:C.border}`,borderRadius:7,color:showOrders?C.accent:C.text2,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
                  🧾 {clientOrders.length} cmd{clientOrders.length!==1?"s":""}
                </button>
                <button onClick={()=>{setSelected(null);setShowOrders(false)}} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18}}>×</button>
              </div>
            </div>

            {/* Panel commandes */}
            {showOrders&&<div style={{borderBottom:`1px solid ${C.border}`,background:C.surface,padding:"10px 14px",maxHeight:220,overflowY:"auto",flexShrink:0}}>
              {clientOrders.length===0?<div style={{textAlign:"center",color:C.text3,fontSize:12,padding:"6px 0"}}>Aucune commande</div>
              :clientOrders.map(o=><div key={o.id} style={{marginBottom:9,padding:"9px 11px",background:C.card,borderRadius:7,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontFamily:"'JetBrains Mono'",fontSize:11,color:C.accent}}>{o.id}</span>
                  <span style={{fontSize:11,fontWeight:700}}>{fmt(parseFloat(o.total)+parseFloat(o.livraison||0))}</span>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {Object.entries(STATUS).map(([key,cfg])=><button key={key} onClick={()=>updateOrderStatus(o.id,key)} disabled={updatingO||o.status===key} style={{padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600,cursor:o.status===key?"default":"pointer",border:`1px solid ${o.status===key?cfg.color:C.border}`,background:o.status===key?cfg.bg:"transparent",color:o.status===key?cfg.color:C.text3,fontFamily:"'DM Sans',sans-serif"}}>{cfg.label}</button>)}
                </div>
              </div>)}
            </div>}

            {/* Messages */}
            <div ref={messagesContainerRef} style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:7,minHeight:0}}>
              {userMessages(selected.id).length===0&&<div style={{textAlign:"center",color:C.text3,fontSize:13,padding:20}}>Aucun message</div>}
              {userMessages(selected.id).map(m=>(
                <div key={m.id} data-msgid={m.id} data-direction={m.direction} style={{display:"flex",justifyContent:m.direction==="out"?"flex-end":"flex-start",gap:5,alignItems:"flex-end"}}>
                  {m.direction==="in"&&<div style={{width:26,height:26,borderRadius:"50%",background:C.accentDim,border:`1px solid ${C.accentMid}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>👤</div>}
                  <div style={{maxWidth:"74%"}}>
                    {renderMessage(m)}
                    <div style={{fontSize:10,color:C.text3,marginTop:2,display:"flex",alignItems:"center",gap:5,justifyContent:m.direction==="out"?"flex-end":"flex-start"}}>
                      {new Date(m.created_at).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}
                      {m.direction==="out"&&<button onClick={()=>deleteMsg(m)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:10,padding:0,opacity:.5}}>🗑</button>}
                    </div>
                  </div>
                  {m.direction==="in"&&<button onClick={()=>deleteMsg(m)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:10,opacity:.4}}>🗑</button>}
                </div>
              ))}
              <div ref={messagesEndRef}/>
            </div>

            {/* Zone réponse */}
            <div style={{padding:"9px 13px",borderTop:`1px solid ${C.border}`,background:C.surface,flexShrink:0}}>
              {replyFile&&<div style={{padding:"5px 10px",background:C.accentDim,borderRadius:7,marginBottom:7,fontSize:12,color:C.accent,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>📎 {replyFile.name}</span>
                <button onClick={()=>{setReplyFile(null);fileRef.current.value=""}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:13}}>×</button>
              </div>}
              <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
                <button onClick={()=>fileRef.current?.click()} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text2,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>📎</button>
                <input ref={fileRef} type="file" accept="image/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx" style={{display:"none"}} onChange={e=>setReplyFile(e.target.files[0]||null)}/>
                <textarea value={reply} onChange={e=>setReply(e.target.value)} placeholder="Message..." onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendReply())} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:9,color:C.text1,fontSize:13,padding:"8px 12px",outline:"none",resize:"none",maxHeight:100,minHeight:36,fontFamily:"'DM Sans',sans-serif",lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border} rows={1}/>
                <button onClick={sendReply} disabled={sending||(!reply.trim()&&!replyFile)} style={{background:sending||(!reply.trim()&&!replyFile)?C.border:C.accent,border:"none",borderRadius:9,color:C.bg,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
                  {sending?"⏳":"➤"}
                </button>
              </div>
            </div>
          </>}
        </div>
      </div>
    )}
  </div>
}

/* ── APP ── */
function App(){
  const [logged,setLogged]=useState(()=>localStorage.getItem("zkpro_logged")==="1");
  const [page,setPage]=useState("dashboard");
  const [orders,setOrders]=useState([]);
  const [selectedOrder,setSelectedOrder]=useState(null);
  const [products,setProducts]=useState([]);
  const [loadO,setLoadO]=useState(false);
  const [loadP,setLoadP]=useState(false);
  const [unreadMsgCount,setUnreadMsgCount]=useState(0);

  const login=()=>{localStorage.setItem("zkpro_logged","1");setLogged(true)};
  const logout=()=>{localStorage.removeItem("zkpro_logged");setLogged(false)};

  const fetchOrders=async()=>{setLoadO(true);try{setOrders(await sbGet("orders","?order=created_at.desc"))}catch(e){console.error(e)}setLoadO(false)};
  const fetchProducts=async()=>{setLoadP(true);try{setProducts(await sbGet("products","?order=id.asc"))}catch(e){console.error(e)}setLoadP(false)};

  const pollUnread=async()=>{
    try{const msgs=await sbGet("bot_messages","?direction=eq.in&order=created_at.desc&limit=200");const rids=JSON.parse(localStorage.getItem("zkpro_read_ids")||"[]");setUnreadMsgCount(msgs.filter(m=>!rids.includes(m.id)).length)}catch(e){}
  };

  useEffect(()=>{if(logged){fetchOrders();fetchProducts();pollUnread()}},[logged]);
  useEffect(()=>{if(!logged)return;const t=setInterval(fetchOrders,30000);return()=>clearInterval(t)},[logged]);
  useEffect(()=>{if(!logged)return;const t=setInterval(pollUnread,5000);return()=>clearInterval(t)},[logged]);

  const newCount=orders.filter(o=>o.status==="nouveau").length;
  if(!logged)return<LoginPage onLogin={login}/>;

  return<div style={{display:"flex",minHeight:"100vh"}}>
    <Sidebar page={page} setPage={setPage} onLogout={logout} newCount={newCount} unreadMsg={unreadMsgCount}/>
    <main className="main-content" style={{flex:1}}>
      {page==="dashboard"&&<DashboardPage orders={orders} products={products} setPage={setPage}/>}
      {page==="orders"&&<OrdersPage orders={orders} setOrders={setOrders} products={products} setProducts={setProducts} loading={loadO} reload={fetchOrders} selectedOrder={selectedOrder} setSelectedOrder={setSelectedOrder}/>}
      {page==="clients"&&<ClientsPage orders={orders} setOrders={setOrders} setProducts={setProducts}/>}
      {page==="catalog"&&<CatalogPage products={products} setProducts={setProducts} loading={loadP} reload={fetchProducts}/>}
      {page==="messages"&&<MessagesPage onRead={()=>{setUnreadMsgCount(0);pollUnread()}} onGoToOrder={id=>{setSelectedOrder(id);setPage("orders");fetchOrders()}} orders={orders} setOrders={setOrders} setProducts={setProducts}/>}
      {page==="settings"&&<div className="fade-in" style={{maxWidth:620}}>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:34,letterSpacing:"0.05em",marginBottom:20}}>Paramètres</div>
        <Card style={{marginBottom:14}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:14}}>Liens rapides</div>
          {[{label:"🛒 Boutique Telegram",url:"https://anserfj.github.io/telegram-shop/",sub:"anserfj.github.io/telegram-shop"},{label:"🗄️ Supabase Console",url:"https://supabase.com/dashboard/project/hyigrnuoojusixzahjvq",sub:"hyigrnuoojusixzahjvq.supabase.co"},{label:"⚙️ Cloudflare Worker",url:"https://dash.cloudflare.com",sub:"Bot webhook"}].map(l=>
          <div key={l.url} style={{padding:"12px 14px",background:C.surface,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div><div style={{fontSize:13,fontWeight:600}}>{l.label}</div><div style={{fontSize:11,color:C.text3,fontFamily:"'JetBrains Mono'",marginTop:1}}>{l.sub}</div></div>
            <Btn variant="ghost" style={{fontSize:11,padding:"5px 12px"}} onClick={()=>window.open(l.url,"_blank")}>Ouvrir</Btn>
          </div>)}
        </Card>
        <Card>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:"0.05em",marginBottom:14}}>Compte</div>
          <div style={{fontSize:13,color:C.text2,marginBottom:12}}>Connecté en tant que <strong style={{color:C.text1}}>admin@zkpro.fr</strong></div>
          <button onClick={logout} style={{padding:"9px 18px",borderRadius:8,background:"transparent",border:`1px solid ${C.red}44`,color:C.red,fontSize:13,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Déconnexion</button>
        </Card>
      </div>}
    </main>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
